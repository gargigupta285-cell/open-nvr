###############################################
# Global settings
#
# SECURITY HARDENED CONFIGURATION
# All services bound to localhost only
# JWT authentication enforced
# No anonymous access
###############################################

###############################################
# Global settings -> General

logLevel: info
logDestinations: [stdout]
logFile: mediamtx.log
sysLogPrefix: mediamtx

readTimeout: 10s
writeTimeout: 10s
writeQueueSize: 512
udpMaxPayloadSize: 1472

runOnConnect:
runOnConnectRestart: no
runOnDisconnect:

###############################################
# Global settings -> Authentication
#
# SECURITY: JWT-based authentication ONLY
# All access requires valid JWT from backend
###############################################

# JWT authentication - backend is the sole authority
authMethod: jwt

# Internal authentication DISABLED - no anonymous users
authInternalUsers: []

# HTTP-based authentication DISABLED
authHTTPAddress:
authHTTPExclude: []

# JWT-based authentication configuration
# Backend JWKS endpoint provides public keys for JWT validation
# Uses 127.0.0.1 for host network mode (all services on localhost)
# Overridden at runtime by MTX_AUTHJWTJWKS env var injected from docker-compose:
#   Windows/Mac (bridge): MTX_AUTHJWTJWKS=http://opennvr_core:8000/.well-known/jwks.json
#   Linux (host mode):    MTX_AUTHJWTJWKS=http://127.0.0.1:8000/.well-known/jwks.json
# This hardcoded value is a never-used fallback — MTX_AUTHJWTJWKS always takes precedence.
authJWTJWKS: http://127.0.0.1:8000/.well-known/jwks.json
authJWTJWKSFingerprint:
# Claim containing MediaMTX permissions
authJWTClaimKey: mediamtx_permissions
# Exclude Admin API and Playback from JWT (already protected by localhost binding)
authJWTExclude:
  - action: api
  - action: playback
# Allow JWT in query params for HLS compatibility (HLS.js can't send headers for all segment requests)
# Token will be passed as: index.m3u8?jwt=<token>
authJWTInHTTPQuery: true

###############################################
# Global settings -> Control API
#
# SECURITY: Bound to localhost only
# Accessible only by backend application
###############################################

api: yes
# Allow access from other Docker containers (still protected by Docker port mapping to 127.0.0.1 on host)
apiAddress: 0.0.0.0:9997
apiEncryption: no
apiServerKey: /etc/mediamtx-certs/server.key
apiServerCert: /etc/mediamtx-certs/server.crt
# SECURITY: Restrict CORS (allow frontend dev server and backend)
apiAllowOrigins: ['*']
apiTrustedProxies: []

###############################################
# Global settings -> Metrics
#
# SECURITY: Disabled in production
###############################################

metrics: no
metricsAddress: 127.0.0.1:9998
metricsEncryption: no
metricsServerKey: /etc/mediamtx-certs/server.key
metricsServerCert: /etc/mediamtx-certs/server.crt
metricsAllowOrigins: []
metricsTrustedProxies: []

###############################################
# Global settings -> PPROF
#
# SECURITY: Disabled in production
###############################################

pprof: no
pprofAddress: 127.0.0.1:9999
pprofEncryption: no
pprofServerKey: /etc/mediamtx-certs/server.key
pprofServerCert: /etc/mediamtx-certs/server.crt
pprofAllowOrigins: []
pprofTrustedProxies: []

###############################################
# Global settings -> Playback server
#
# SECURITY: Localhost only - recordings accessed via backend proxy
###############################################

playback: yes
# Allow access from other Docker containers (still protected by Docker port mapping to 127.0.0.1 on host)
playbackAddress: 0.0.0.0:9996
playbackEncryption: no
playbackServerKey: /etc/mediamtx-certs/server.key
playbackServerCert: /etc/mediamtx-certs/server.crt
# SECURITY: Restrict CORS (allow frontend dev server and backend)
playbackAllowOrigins: ['http://127.0.0.1:8000', 'http://localhost:5173', 'http://localhost:8000']
playbackTrustedProxies: []

###############################################
# Global settings -> RTSP server
#
# SECURITY: Localhost only - cameras connect internally
###############################################

rtsp: yes
# TCP only for localhost - UDP disabled to prevent external access
rtspTransports: [tcp]
# RTSP listener policy:
#   - The TLS listener (rtspsAddress :8322) is the operator-facing
#     surface. It binds to all interfaces inside the container; the
#     docker-compose port map (127.0.0.1:8322:8322) exposes it on the
#     host loopback so external tools that need RTSP get TLS.
#   - The plaintext listener (rtspAddress :8554) binds too, but is
#     deliberately NOT mapped to the host — it is only reachable from
#     other containers on the opennvr_internal Docker network.
#
# Why allow plaintext at all? Because the inference path inside the
# stack reads frames from MediaMTX via rtsp://mediamtx:8554/cam-N —
# a hop that never leaves the same kernel's loopback. Forcing TLS
# there pays a per-frame encrypt + decrypt cost (~15-35% of the
# steady-state CPU budget on Pi-class hardware) to protect two
# pipes that share the same trust domain. The plaintext-loopback
# tap matches the trust model: TLS for things that cross the host
# boundary, plaintext for things that don't.
#
# To revert to TLS-only (strict mode) — e.g., if you've moved the
# adapter or KAI-C onto a different host and the MediaMTX→KAI-C hop
# now crosses a network — set this back to "strict" AND flip
# INFERENCE_USE_MEDIAMTX_TAP=false in the backend env so KAI-C
# stops trying to read the plaintext listener. The acknowledgement
# of either change lands in the boot audit log.
#
# See docs/SECURITY_ARCHITECTURE.md §"RTSP encryption posture" for
# the trust-boundary rationale in detail.
rtspEncryption: "optional"
rtspAddress: :8554
rtspsAddress: :8322
# SECURITY: Disable UDP listeners (localhost TCP only)
rtpAddress: 127.0.0.1:8010
rtcpAddress: 127.0.0.1:8011
multicastIPRange: 224.1.0.0/16
multicastRTPPort: 8002
multicastRTCPPort: 8003
srtpAddress: 127.0.0.1:8004
srtcpAddress: 127.0.0.1:8005
multicastSRTPPort: 8006
multicastSRTCPPort: 8007
rtspServerKey: /etc/mediamtx-certs/server.key
rtspServerCert: /etc/mediamtx-certs/server.crt
rtspAuthMethods: [basic]
rtspUDPReadBufferSize: 0

###############################################
# Global settings -> RTMP server
#
# SECURITY: DISABLED - not needed, reduces attack surface
###############################################

rtmp: no
rtmpAddress: 127.0.0.1:1935
rtmpEncryption: "no"
rtmpsAddress: 127.0.0.1:1936
rtmpServerKey: /etc/mediamtx-certs/server.key
rtmpServerCert: /etc/mediamtx-certs/server.crt

###############################################
# Global settings -> HLS server
#
# SECURITY: Localhost only - accessed via backend proxy
###############################################

hls: yes
# M1b-fixup H-1 (Zenodo 17261761 §4.2 Tier 2): the HLS server itself
# terminates TLS so browser clients receive .m3u8 + segment payloads over
# HTTPS. Same server.crt / server.key as the RTSPS listener (see scripts/
# generate-mediamtx-certs.sh). hlsAddress stays at :8888 inside the
# container — the docker-compose port map enforces 127.0.0.1:8888 on
# the host side. Keep these listeners behind the bridge and published
# only through the canonical Compose port mappings.
hlsAddress: :8888
hlsEncryption: yes
hlsServerKey: /etc/mediamtx-certs/server.key
hlsServerCert: /etc/mediamtx-certs/server.crt
# SECURITY: Restrict CORS (allow frontend dev server and backend)
hlsAllowOrigins: ['*']
hlsTrustedProxies: []
hlsAlwaysRemux: no
hlsVariant: fmp4
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsDirectory: ''
hlsMuxerCloseAfter: 60s

###############################################
# Global settings -> WebRTC server
#
# SECURITY: Localhost only with IP leakage prevention
###############################################

webrtc: yes
# M1b-fixup H-2 (peer review F-5): webrtcEncryption governs the WHIP/WHEP
# signaling HTTP channel, not the media plane (media is always DTLS-SRTP).
# Plaintext signaling exposes SDP, ICE candidates, AND ?jwt= query tokens
# in URLs (authJWTInHTTPQuery: true above) to anyone on the wire — TLS is
# mandatory. Same cert pair as RTSPS/HLSS. Address pattern matches HLS:
# bind to :8889 inside the container, rely on the docker-compose port map
# for the host-side loopback boundary.
webrtcAddress: :8889
webrtcEncryption: yes
webrtcServerKey: /etc/mediamtx-certs/server.key
webrtcServerCert: /etc/mediamtx-certs/server.crt
# SECURITY: Restrict CORS (allow frontend dev server and backend)
webrtcAllowOrigins: ['*']
webrtcTrustedProxies: []
# Listen on all interfaces for WebRTC ICE
webrtcLocalTCPAddress: :8189
webrtcLocalUDPAddress: :8189
# HOST MODE: Allow WebRTC to discover and advertise host's network interfaces
# This is required for WHEP streaming to work from other machines on the LAN
webrtcIPsFromInterfaces: yes
webrtcIPsFromInterfacesList: []
# Additional hosts to advertise (localhost always included)
webrtcAdditionalHosts: []
webrtcICEServers2: []
webrtcHandshakeTimeout: 10s
webrtcTrackGatherTimeout: 2s
webrtcSTUNGatherTimeout: 5s

###############################################
# Global settings -> SRT server
#
# SECURITY: DISABLED - not needed, reduces attack surface
###############################################

srt: no
srtAddress: 127.0.0.1:8890

###############################################
# Default path settings
#
# SECURITY: Deny-by-default, no publisher hijacking
###############################################
pathDefaults:

  ###############################################
  # Default path settings -> General

  source: publisher
  sourceFingerprint:
  sourceOnDemand: no
  sourceOnDemandStartTimeout: 10s
  sourceOnDemandCloseAfter: 10s
  # SECURITY: Limit concurrent readers per stream
  maxReaders: 10
  srtReadPassphrase:
  fallback:
  useAbsoluteTimestamp: false

  ###############################################
  # Default path settings -> Record
  #
  # Recording enabled but only accessible via backend

  record: yes
  recordPath: ./app/recordings/%path/%Y/%m/%d/%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordMaxPartSize: 50M
  recordSegmentDuration: 1h
  recordDeleteAfter: 0s

  ###############################################
  # Default path settings -> Publisher source
  #
  # SECURITY: Prevent publisher hijacking

  # SECURITY: Do NOT allow publisher override - prevents stream hijacking
  overridePublisher: no
  srtPublishPassphrase:

  ###############################################
  # Default path settings -> RTSP source

  rtspTransport: tcp
  rtspAnyPort: no
  rtspRangeType:
  rtspRangeStart:
  rtspUDPReadBufferSize: 0

  ###############################################
  # Default path settings -> MPEG-TS source

  mpegtsUDPReadBufferSize: 0

  ###############################################
  # Default path settings -> RTP source

  rtpSDP:
  rtpUDPReadBufferSize: 0

  ###############################################
  # Default path settings -> Redirect source

  sourceRedirect:

  ###############################################
  # Default path settings -> Raspberry Pi Camera source

  rpiCameraCamID: 0
  rpiCameraSecondary: false
  rpiCameraWidth: 1920
  rpiCameraHeight: 1080
  rpiCameraHFlip: false
  rpiCameraVFlip: false
  rpiCameraBrightness: 0
  rpiCameraContrast: 1
  rpiCameraSaturation: 1
  rpiCameraSharpness: 1
  rpiCameraExposure: normal
  rpiCameraAWB: auto
  rpiCameraAWBGains: [0, 0]
  rpiCameraDenoise: "off"
  rpiCameraShutter: 0
  rpiCameraMetering: centre
  rpiCameraGain: 0
  rpiCameraEV: 0
  rpiCameraROI:
  rpiCameraHDR: false
  rpiCameraTuningFile:
  rpiCameraMode:
  rpiCameraFPS: 30
  rpiCameraAfMode: continuous
  rpiCameraAfRange: normal
  rpiCameraAfSpeed: normal
  rpiCameraLensPosition: 0.0
  rpiCameraAfWindow:
  rpiCameraFlickerPeriod: 0
  rpiCameraTextOverlayEnable: false
  rpiCameraTextOverlay: '%Y-%m-%d %H:%M:%S - MediaMTX'
  rpiCameraCodec: auto
  rpiCameraIDRPeriod: 60
  rpiCameraBitrate: 5000000
  rpiCameraHardwareH264Profile: main
  rpiCameraHardwareH264Level: '4.1'
  rpiCameraSoftwareH264Profile: baseline
  rpiCameraSoftwareH264Level: '4.1'
  rpiCameraMJPEGQuality: 60

  ###############################################
  # Default path settings -> Hooks
  #
  # SECURITY: All hooks call backend with secret header for authentication
  # 
  # Environment variables (set before starting MediaMTX):
  #   - MEDIAMTX_SECRET: Webhook authentication secret (REQUIRED - must match server/.env)
  #   - BACKEND_HOST: Backend hostname (default: 127.0.0.1 for host network mode)
  #   - BACKEND_PORT: Backend port (default: 8000)
  #
  # The secret is passed via environment variable and automatically substituted.
  # No manual editing required - just set MEDIAMTX_SECRET in server/.env!
  ###############################################

  # NOTE: runOnInit lives ONLY on the __startup__ path below, not here in
  # pathDefaults. If it's in pathDefaults it is inherited by EVERY camera path,
  # so every camera (re)provision re-fires the startup hook, which re-provisions
  # cameras, which re-fires the hook → an infinite reload/provision loop that
  # also fragments recordings. Keep it out of pathDefaults.

  runOnDemand:
  runOnDemandRestart: no
  runOnDemandStartTimeout: 10s
  runOnDemandCloseAfter: 10s
  runOnUnDemand:

  runOnReady:
  runOnReadyRestart: no
  runOnNotReady:

  runOnRead:
  runOnReadRestart: no
  runOnUnread:

  runOnRecordSegmentCreate:

  # Recording webhook - notifies backend when a recording segment completes
  # Uses custom opennvr-mediamtx image with curl installed
  runOnRecordSegmentComplete: 'curl -X GET -H "X-MTX-Secret: ${MEDIAMTX_SECRET}" "http://${BACKEND_HOST}:${BACKEND_PORT}/api/v1/mediamtx/hooks/segment-complete?path=$MTX_PATH&segment_path=$MTX_SEGMENT_PATH&segment_duration=$MTX_SEGMENT_DURATION"'


###############################################
# Path settings
#
# Paths are dynamically provisioned by backend
# Only __startup__ path is static to trigger runOnInit hook
###############################################
paths:
  # Dummy path to trigger startup hook - provisions cameras from database
  # This path initializes on MediaMTX start, calling runOnInit which
  # provisions all cameras from the backend database
  __startup__:
    source: publisher
    record: no
    # Startup hook - provisions cameras from backend DB once on MediaMTX start.
    # runOnInitRestart MUST be 'no': the curl exits immediately, so 'yes' would
    # re-run it forever (the loop bug). The backend also self-provisions on its
    # own startup, so a single best-effort fire here is enough.
    runOnInit: 'curl -X GET -H "X-MTX-Secret: ${MEDIAMTX_SECRET}" "http://${BACKEND_HOST}:${BACKEND_PORT}/api/v1/mediamtx/startup/hook?delay=5"'
    runOnInitRestart: no

