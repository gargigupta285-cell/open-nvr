# ============================================================
# OpenNVR — canonical compose file
# ============================================================
#
# This is a thin pointer to docker-compose.tier0.yml — the
# hardened production-ready stack. Operators get the right
# default with bare `docker compose up -d` (no `-f` flag).
#
# This file replaced the old mode-toggled docker-compose.yml in
# ISSUE-17. Why use ``include:`` instead of duplicating tier0.yml's
# content here:
#
#   * Zero drift. ``include:`` is a Docker Compose v2.20+
#     directive that merges the referenced file at parse time.
#     Editing tier0.yml updates both forms simultaneously —
#     there is no copy of the service definitions to fall out of
#     sync.
#   * Back-compat preserved. Any script with
#     ``docker compose -f docker-compose.tier0.yml up -d`` in it
#     keeps working unchanged. The two invocations produce
#     identical container topology.
#   * Reviewable diffs. Changes show up against tier0.yml where
#     reviewers expect them, not duplicated across two files.
#
# What you actually get when you run ``docker compose up -d``:
#
#   * opennvr-core (backend + frontend + KAI-C middleware)
#   * postgres (application database)
#   * mediamtx (RTSP / HLS / WebRTC streaming engine, TLS)
#   * nginx (TLS reverse-proxy edge for LAN HTTPS access)
#   * nats (inference events + audit bus)
#   * yolov8-weights-init + yolov8-adapter (object detection
#     out of the box from a pre-baked GHCR image)
#   * Self-signed cert generation for mediamtx + nginx
#
# Need a different topology — host networking for ONVIF
# multicast discovery, dev workflow, custom overlay — see the
# "Compose file reference" section in docs/DOCKER_SETUP.md.
# Quickstart: ``./start.sh up``. See README.md.
#
# Docker Compose version note: ``include:`` requires Docker
# Compose v2.20 or newer (released Aug 2023). Older versions
# (most notably the python-based docker-compose v1.x that
# shipped with Ubuntu 20.04) do NOT support this. Operators on
# old hosts have two options: (a) upgrade Docker Compose, or
# (b) substitute ``-f docker-compose.tier0.yml`` in any compose
# command. The error message from an old client is clear:
# "include is not supported".
# ============================================================

include:
  - docker-compose.tier0.yml
