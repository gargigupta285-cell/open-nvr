# ==========================================
# OpenNVR - Docker Compose Configuration
# ==========================================
# 
# SETUP INSTRUCTIONS:
# 1. Copy .env.example to .env
# 2. Generate secrets: ./scripts/generate-secrets.ps1 (or .sh)
# 3. Update .env with generated secrets
# 4. Run: docker compose up -d
#
# IMPORTANT:
# - All secrets are loaded from .env file (NOT hardcoded)
# - Never commit .env to version control!
#
# 🚨 CHOOSE YOUR NETWORK MODE BASED ON YOUR OS 🚨
# Choose ONE mode below and comment/uncomment sections labeled as such in this file.
#
# 👉 OPTION 1: BRIDGE MODE (Default for Windows / Mac)
#    - Best for development on Windows and Mac.
#    - Look for `# [WINDOWS/MAC] BRIDGE MODE:` lines in this file.
#    - UNCOMMENT the lines under those sections (ports, networks, bridge env vars).
#
# 👉 OPTION 2: HOST MODE (Required for Linux / ONVIF Discovery)
#    - Required for ONVIF camera discovery via UDP broadcast cache on Linux.
#    - Look for `# [LINUX] HOST MODE:` lines in this file.
#    - UNCOMMENT the lines under those sections (network_mode: host, linux env vars).
#    - COMMENT OUT all BRIDGE MODE lines.
#
# 💡 TIP: Use the smart launcher scripts instead of this file directly:
#    - Linux/macOS: ./start.sh build
#    - Windows:     .\start.ps1 build
# ==========================================

services:
  # ==========================================
  # 1. DATABASE (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: opennvr_db
    restart: unless-stopped
    # ----------------------------------------------------
    # [LINUX] HOST MODE: Uncomment ONE line below
    # network_mode: host
    # ----------------------------------------------------
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # [LINUX] HOST MODE: PostgreSQL binds to port 5432 on host
      # PGPORT: 5432
    volumes:
      - opennvr_db_data:/var/lib/postgresql/data
    # ----------------------------------------------------
    # [WINDOWS/MAC] BRIDGE MODE: Uncomment lines below
    networks:
      - sentinel_internal
    # ----------------------------------------------------
    healthcheck:
      # [LINUX] HOST MODE: Uncomment line below
      # test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1"]
      # [WINDOWS/MAC] BRIDGE MODE: Uncomment line below
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5

  # ==========================================
  # 2a. MEDIAMTX CERT INIT (one-shot)
  # ==========================================
  #
  # M1b-fixup-v2 F-9: auto-generate a self-signed TLS cert pair if none
  # exists, so a fresh `docker compose up` doesn't fail on missing
  # ./mediamtx-certs/server.{crt,key}. The init container exits cleanly
  # after generation; MediaMTX depends on it via `service_completed_
  # successfully` so the cert is guaranteed to exist before MediaMTX
  # starts.
  #
  # If the operator already ran scripts/generate-mediamtx-certs.sh
  # manually, this is a no-op and prints a single line confirming the
  # certs are present.
  mediamtx-certs-init:
    image: alpine:3.20
    container_name: opennvr_mediamtx_certs_init
    command:
      - sh
      - -c
      - |
        set -e
        if [ -f /certs/server.crt ] && [ -f /certs/server.key ]; then
          echo "MediaMTX certs already present at /certs/server.{crt,key}; skipping generation."
          exit 0
        fi
        echo "Generating self-signed MediaMTX cert pair (V-019)..."
        apk add --no-cache openssl >/dev/null
        umask 077
        openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
          -keyout /certs/server.key -out /certs/server.crt \
          -subj "/CN=opennvr-mediamtx" \
          -addext "subjectAltName=DNS:localhost,DNS:mediamtx,IP:127.0.0.1,IP:::1" \
          -addext "basicConstraints=critical,CA:FALSE" \
          -addext "keyUsage=critical,digitalSignature,keyEncipherment" \
          -addext "extendedKeyUsage=serverAuth"
        chmod 0644 /certs/server.crt
        echo "Wrote /certs/server.crt + /certs/server.key. SAN: localhost, mediamtx, 127.0.0.1, ::1"
    volumes:
      - ./mediamtx-certs:/certs

  # ==========================================
  # 2. MEDIAMTX (Streaming Server)
  # ==========================================
  mediamtx:
    # Official MediaMTX 1.15.4 + curl for webhooks (runOnInit, runOnRecordSegmentComplete).
    # Multi-stage: mediamtx binary is on scratch so we copy it into Alpine where apk works.
    build:
      context: .
      dockerfile_inline: |
        # ISSUE-7 v4: see docker-compose.tier0.yml for rationale.
        # curlimages/curl as the final base means curl + its
        # dynamic libs (libcurl.so.4, libssl, libcrypto, ...) are
        # all wired correctly — the v1 alpine + COPY of just the
        # binary left curl unable to load its libs at runtime.
        FROM bluenviron/mediamtx:1.15.4 AS mediamtx-base
        FROM curlimages/curl:8.10.1
        USER root
        COPY --from=mediamtx-base /mediamtx /mediamtx
        ENTRYPOINT ["/mediamtx"]
    container_name: opennvr_mediamtx
    restart: unless-stopped
    # ----------------------------------------------------
    # [LINUX] HOST MODE: Uncomment ONE line below
    # network_mode: host
    # ----------------------------------------------------
    depends_on:
      db:
        condition: service_healthy
      mediamtx-certs-init:
        condition: service_completed_successfully
    # ----------------------------------------------------
    # [WINDOWS/MAC] BRIDGE MODE: Uncomment lines below
    ports:
      # The plaintext RTSP listener (:8554) is intentionally NOT
      # port-mapped to the host. mediamtx.docker.yml runs in
      # rtspEncryption="optional" so the :8554 listener binds, but it's
      # reachable only from inside the docker network — that's where
      # KAI-C's inference frame-capture tap reads from
      # (rtsp://mediamtx:8554/cam-N over loopback, no TLS overhead).
      # External clients use RTSPS at :8322. Operators who need
      # plaintext RTSP exposed to the host for legacy tooling must add
      # `127.0.0.1:8554:8554` back here and accept that JWT auth is
      # the only protection on that path; see docs/SECURITY_ARCHITECTURE.md
      # §"RTSP encryption posture" for the trust-boundary rationale.
      - "127.0.0.1:8322:8322" # RTSPS (V-019 / RFC 7826 — TLS-required RTSP)
      - "127.0.0.1:8888:8888" # HLS (HTTPS — hlsEncryption=yes)
      - "127.0.0.1:8889:8889" # WebRTC Signaling (HTTPS — webrtcEncryption=yes)
      - "127.0.0.1:8189:8189/tcp" # WebRTC ICE TCP
      - "127.0.0.1:8189:8189/udp" # WebRTC ICE UDP
      - "127.0.0.1:9997:9997" # API/Metrics
      - "127.0.0.1:9996:9996" # Playback API
    # ----------------------------------------------------
    volumes:
      # Mount Docker-specific mediamtx configuration
      - ./mediamtx.docker.yml:/mediamtx.yml:ro
      # M1b-fixup-v2 F-9: directory mount instead of per-file mount.
      # Per-file mounts cause Docker to silently create an empty
      # *directory* at the host path when the source doesn't exist —
      # MediaMTX then fails to start with "is a directory" instead of
      # "no such file or directory". The directory mount works whether
      # the certs were generated ahead of time by
      # scripts/generate-mediamtx-certs.sh or by the
      # mediamtx-certs-init service above. The YAML references the
      # certs via absolute path (/etc/mediamtx-certs/...).
      - ./mediamtx-certs:/etc/mediamtx-certs:ro
      # Mount recordings directory (configurable via .env file)
      - ${RECORDINGS_PATH:-/home/ubuntu/recordings}:/app/recordings
    environment:
      # MediaMTX webhook configuration
      - MEDIAMTX_SECRET=${MEDIAMTX_SECRET}
      # ----------------------------------------------------
      # [LINUX] HOST MODE: Uncomment ONE line below
      # - BACKEND_HOST=127.0.0.1
      # - MTX_AUTHJWTJWKS=http://127.0.0.1:8000/.well-known/jwks.json
      # ----------------------------------------------------
      # [WINDOWS/MAC] BRIDGE MODE: Uncomment ONE line below
      - BACKEND_HOST=${BACKEND_HOST:-opennvr_core}
      - MTX_AUTHJWTJWKS=http://opennvr_core:8000/.well-known/jwks.json
      # ----------------------------------------------------
      - BACKEND_PORT=${BACKEND_PORT:-8000}
    # ----------------------------------------------------
    # [WINDOWS/MAC] BRIDGE MODE: Uncomment lines below
    networks:
      - sentinel_internal
    # ----------------------------------------------------
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9997/v3/paths/list"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # ==========================================
  # 2b. NATS (B1 event bus)
  # ==========================================
  #
  # B1: KAI-C publishes ``opennvr.inference.{adapter}.{camera_id}.completed``
  # events on NATS so monitoring apps (intrusion-detection, future
  # loitering / PPE / fire-detection siblings) can subscribe instead
  # of polling KAI-C. One adapter inference fans out to N consumers
  # → adapter GPU load drops N×.
  #
  # Authentication is token-based; the token is the same
  # INTERNAL_API_KEY operators already manage for KAI-C's HTTP/WS
  # surface. No port is published to the host because NATS is an
  # internal service — only ``opennvr-core`` (which runs KAI-C +
  # any subscribers) talks to it via the ``sentinel_internal`` Docker
  # network. Setting ``NATS_URL=""`` on opennvr-core disables
  # publishing entirely for operators not yet on the event bus.
  #
  # Operators wanting external subscribers (e.g., a Splunk forwarder
  # running outside the docker-compose) must add a port mapping AND
  # ensure the listening interface is firewalled or behind a private
  # network — the loopback-only assumption baked in here is what
  # AI_SOVEREIGNTY=local_only enforces at KAI-C startup.
  nats:
    image: nats:2-alpine
    container_name: opennvr_nats
    restart: unless-stopped
    command:
      - --name
      - opennvr-nats
      - --auth
      # Required: NATS token = INTERNAL_API_KEY. ``${VAR:?...}`` makes
      # ``docker compose up`` fail at validate time if the env var is
      # unset/empty rather than silently starting NATS without auth.
      # (Peer review H2 — without this, a missing INTERNAL_API_KEY
      # leaves the broker open to anyone on the sentinel_internal
      # network.)
      - ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env for the NATS event bus}
      # JetStream off for v1 — KAI-C only does fire-and-forget
      # publish. Persistence / replay is a B2 concern.
      - --http_port
      - "8222"
    # ----------------------------------------------------
    # [LINUX] HOST MODE: Uncomment ONE line below
    # network_mode: host
    # ----------------------------------------------------
    # ----------------------------------------------------
    # [WINDOWS/MAC] BRIDGE MODE: Uncomment lines below
    networks:
      - sentinel_internal
    # ----------------------------------------------------
    # Intentionally NO ``ports:`` mapping — NATS is internal-only
    # under default deployment. Subscribers run inside the same
    # docker-compose project (opennvr-core, future inference-listener
    # service). Operators needing external subscribers add the mapping
    # themselves and re-evaluate sovereignty implications.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ==========================================
  # 3. CORE APPLICATION (Backend + Frontend + Kai-C)
  # ==========================================
  opennvr-core:
    # Build locally

    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: opennvr_core
    restart: unless-stopped
    # ----------------------------------------------------
    # [LINUX] HOST MODE: Uncomment ONE line below
    # network_mode: host
    # ----------------------------------------------------
    depends_on:
      db:
        condition: service_healthy
      mediamtx:
        condition: service_healthy
      # B1 — KAI-C connects to NATS at startup. NATS_URL empty in
      # the operator's .env disables broadcast cleanly; this
      # depends_on only matters when NATS is actually being used.
      nats:
        condition: service_healthy
    # ----------------------------------------------------
    # [WINDOWS/MAC] BRIDGE MODE: Uncomment lines below
    ports:
      - "127.0.0.1:8000:8000" # API
    # ----------------------------------------------------
    volumes:
      - shared_frames:/app/AI-adapters/AIAdapters/frames
      # Mount project root for configuration access
      - .:/app/host-root
      # Mount recordings directory (configurable via .env file)
      - ${RECORDINGS_PATH:-/home/ubuntu/recordings}:/app/recordings
    environment:
      # ----------------------------------------------------
      # [LINUX] HOST MODE: Uncomment lines below
      # - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB}
      # - MEDIAMTX_BASE_URL=http://127.0.0.1:8889
      # - MEDIAMTX_ADMIN_API=http://127.0.0.1:9997/v3
      # - MEDIAMTX_HLS_URL=http://127.0.0.1:8888
      # - MEDIAMTX_RTSP_URL=rtsp://127.0.0.1:8554
      # - MEDIAMTX_PLAYBACK_URL=http://127.0.0.1:9996
      # - KAI_C_URL=http://127.0.0.1:8100
      # ----------------------------------------------------
      
      # ----------------------------------------------------
      # [WINDOWS/MAC] BRIDGE MODE: Uncomment lines below
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - MEDIAMTX_BASE_URL=http://mediamtx:8889
      - MEDIAMTX_ADMIN_API=http://mediamtx:9997/v3
      - MEDIAMTX_HLS_URL=http://mediamtx:8888
      - MEDIAMTX_RTSP_URL=rtsp://mediamtx:8554
      # Internal name `mediamtx` is what backend-to-MediaMTX probes use
      # (resolvable via Docker DNS). Browser/external clients can't
      # resolve that name, so MEDIAMTX_EXTERNAL_RTSPS_URL below is what
      # /streams/.../tokens hands them — see server/routers/streams.py
      # for the fallback chain (F-1).
      - MEDIAMTX_RTSPS_URL=rtsps://mediamtx:8322
      - MEDIAMTX_EXTERNAL_RTSPS_URL=rtsps://localhost:8322
      - MEDIAMTX_PLAYBACK_URL=http://mediamtx:9996
      - KAI_C_URL=http://127.0.0.1:8100
      # ----------------------------------------------------
      
      # External URLs for browser access
      - MEDIAMTX_EXTERNAL_BASE_URL=http://127.0.0.1:8889
      - MEDIAMTX_EXTERNAL_HLS_URL=http://127.0.0.1:8888
      - MEDIAMTX_EXTERNAL_PLAYBACK_URL=http://127.0.0.1:9996
      
      # Path mapping configuration for volume mounts
      - RECORDINGS_HOST_BASE=${RECORDINGS_PATH}
      - RECORDINGS_CONTAINER_BASE=/app/recordings
      - RECORDINGS_BASE_PATH=/app/recordings
      
      # Security secrets - loaded from .env file
      - SECRET_KEY=${SECRET_KEY}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - MEDIAMTX_SECRET=${MEDIAMTX_SECRET}
      
      # AI Adapter URL (for Kai-C → ai-adapters routing via supervisord)
      # Override via .env: ADAPTER_URL=http://opennvr_ai:9100 (bridge) or http://127.0.0.1:9100 (host)
      - ADAPTER_URL=${ADAPTER_URL:-http://opennvr_ai:9100}

      # B1 — NATS URL for KAI-C's broadcast publisher. Empty disables
      # broadcast cleanly (HTTP/WS inference paths still work). For
      # [LINUX] HOST MODE operators, change to ``nats://127.0.0.1:4222``.
      - NATS_URL=${NATS_URL:-nats://nats:4222}

      # Frames directory — must match the shared_frames volume mount path in this container
      - FRAMES_DIR=/app/AI-adapters/AIAdapters/frames

      # Application settings
      - HOST=${HOST:-0.0.0.0}
      - DEBUG=${DEBUG:-False}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    # ----------------------------------------------------
    # [WINDOWS/MAC] BRIDGE MODE: Uncomment lines below
    networks:
      - sentinel_internal
    # ----------------------------------------------------

  # ==========================================
  # 4. OPTIONAL: AI WORKER (Adapters)
  # ==========================================
  # AI detection is completely decoupled and optional.
  # 
  # -> IF YOU WANT CORE FEATURES ONLY (No AI):
  #    Leave this entire block commented out. No extra steps needed.
  #
  # -> IF YOU WANT AI DETECTION ENABLED:
  #    1. Clone the AIAdapters codebase alongside this repository:
  #       git clone https://github.com/open-nvr/ai-adapter.git ../ai-adapter
  #    2. Uncomment the full ai-adapters block below.
  #    3. Run docker compose build again.
  #
  ai-adapters:
    profiles: [ai]
    build:
      context: ../ai-adapter
      dockerfile: Dockerfile
    container_name: opennvr_ai
    restart: unless-stopped
    depends_on:
      opennvr-core:
        condition: service_healthy
    volumes:
      - ../ai-adapter/model_weights:/app/model_weights
      - shared_frames:/app/frames
    # ----------------------------------------------------
    # [WINDOWS/MAC] BRIDGE MODE:
    networks:
      - sentinel_internal
      - public_uplink
    # ----------------------------------------------------

# ==========================================
# NETWORKS
# ==========================================
# ----------------------------------------------------
# [WINDOWS/MAC] BRIDGE MODE: Uncomment lines below
networks:
  # ISSUE-6 v7: pin both bridge subnets so the trust-zone claim is
  # deterministic (V-015 accepts the entire 172.16/12 range) and
  # operator LANs don't accidentally collide with Docker's
  # auto-pick. Override via OPENNVR_DOCKER_SUBNET /
  # OPENNVR_PUBLIC_SUBNET if your LAN uses 172.28/16 or 172.29/16.
  sentinel_internal:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${OPENNVR_DOCKER_SUBNET:-172.28.0.0/16}
  public_uplink:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${OPENNVR_PUBLIC_SUBNET:-172.29.0.0/16}
# ----------------------------------------------------

# ==========================================
# VOLUMES
# ==========================================
volumes:
  opennvr_db_data:
  shared_frames:

