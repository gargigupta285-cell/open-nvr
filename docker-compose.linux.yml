# ==========================================
# OpenNVR - Docker Compose (LINUX / UBUNTU)
# ==========================================
#
# SETUP INSTRUCTIONS:
# 1. Copy .env.docker to .env:   cp .env.docker .env
# 2. Start all services:         docker compose -f docker-compose.linux.yml up -d
# 3. Check status:               docker compose -f docker-compose.linux.yml ps
#
# Uses host network mode - required for ONVIF camera discovery on Linux.
# All services share the host network stack (no port mappings needed).
#
# 💡 TIP: Use the smart launcher instead:
#    ./start.sh build   ← auto-detects Linux and uses this file
# ==========================================

services:
  # ==========================================
  # 1. DATABASE (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: opennvr_db
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - opennvr_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5

  # ==========================================
  # 2. MEDIAMTX (Streaming Server)
  # ==========================================
  # ==========================================
  # MEDIAMTX CERT INIT (one-shot, host-mode equivalent)
  # ==========================================
  # See docker-compose.yml for full rationale (M1b-fixup-v2 F-9).
  mediamtx-certs-init:
    image: alpine:3.20
    container_name: opennvr_mediamtx_certs_init
    command:
      - sh
      - -c
      - |
        set -e
        if [ -f /certs/server.crt ] && [ -f /certs/server.key ]; then
          echo "MediaMTX certs already present at /certs/server.{crt,key}; skipping generation."
          exit 0
        fi
        echo "Generating self-signed MediaMTX cert pair (V-019)..."
        apk add --no-cache openssl >/dev/null
        umask 077
        openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
          -keyout /certs/server.key -out /certs/server.crt \
          -subj "/CN=opennvr-mediamtx" \
          -addext "subjectAltName=DNS:localhost,DNS:mediamtx,IP:127.0.0.1,IP:::1" \
          -addext "basicConstraints=critical,CA:FALSE" \
          -addext "keyUsage=critical,digitalSignature,keyEncipherment" \
          -addext "extendedKeyUsage=serverAuth"
        chmod 0644 /certs/server.crt
        echo "Wrote /certs/server.crt + /certs/server.key. SAN: localhost, mediamtx, 127.0.0.1, ::1"
    volumes:
      - ./mediamtx-certs:/certs

  mediamtx:
    # Official MediaMTX 1.15.4 + curl for webhooks (runOnInit, runOnRecordSegmentComplete).
    # Multi-stage: mediamtx binary is on scratch so we copy it into Alpine where apk works.
    #
    # M1b-fixup C-2 caveat (host network mode): mediamtx.docker.yml binds
    # rtspsAddress to ":8322" so the bridge-mode compose's port map can
    # enforce loopback-only exposure. With network_mode: host (this file),
    # there is no port map — the listener binds directly to all interfaces
    # on the host. Operators using this compose MUST either:
    #   (a) firewall port 8322 externally, or
    #   (b) override mediamtx.docker.yml with a copy that pins
    #       rtspsAddress: 127.0.0.1:8322 (same for hlsAddress / webrtcAddress).
    # See docs/SECURITY_ARCHITECTURE.md §2.2 and the README Upgrading section.
    build:
      context: .
      dockerfile_inline: |
        FROM bluenviron/mediamtx:1.15.4 AS base
        FROM alpine:3.20
        RUN apk add --no-cache curl
        COPY --from=base /mediamtx /mediamtx
        ENTRYPOINT ["/mediamtx"]
    container_name: opennvr_mediamtx
    restart: unless-stopped
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
      mediamtx-certs-init:
        condition: service_completed_successfully
    volumes:
      - ./mediamtx.docker.yml:/mediamtx.yml:ro
      # M1b-fixup-v2 F-9: directory mount + auto-generated by the
      # mediamtx-certs-init service above. YAML refers to
      # /etc/mediamtx-certs/server.{crt,key} via absolute paths.
      - ./mediamtx-certs:/etc/mediamtx-certs:ro
      - ${RECORDINGS_PATH:-/home/ubuntu/recordings}:/app/recordings
    environment:
      - MEDIAMTX_SECRET=${MEDIAMTX_SECRET}
      - BACKEND_HOST=127.0.0.1
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - MTX_AUTHJWTJWKS=http://127.0.0.1:${BACKEND_PORT:-8000}/.well-known/jwks.json
      # Host-mode bind: pin the plaintext RTSP listener (used by the
      # KAI-C inference tap) to loopback so it isn't reachable from
      # the LAN. In bridge mode this isn't needed — the container
      # bridge already isolates :8554 — but host mode shares the
      # host's network stack, so we have to be explicit.
      - MTX_RTSPADDRESS=127.0.0.1:8554
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9997/v3/paths/list"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # ==========================================
  # 3. CORE APPLICATION (Backend + Frontend + Kai-C)
  # ==========================================
  opennvr-core:
    # Build locally
    build:
      context: .
      dockerfile: Dockerfile

    container_name: opennvr_core
    restart: unless-stopped
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
      mediamtx:
        condition: service_healthy
    volumes:
      - shared_frames:/app/AI-adapters/AIAdapters/frames
      - .:/app/host-root
      - ${RECORDINGS_PATH:-/home/ubuntu/recordings}:/app/recordings
    environment:
      # Host mode: all services reachable via 127.0.0.1
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB}
      - MEDIAMTX_BASE_URL=http://127.0.0.1:8889
      - MEDIAMTX_ADMIN_API=http://127.0.0.1:9997/v3
      - MEDIAMTX_HLS_URL=http://127.0.0.1:8888
      - MEDIAMTX_RTSP_URL=rtsp://127.0.0.1:8554
      - MEDIAMTX_RTSPS_URL=rtsps://127.0.0.1:8322
      - MEDIAMTX_PLAYBACK_URL=http://127.0.0.1:9996
      - KAI_C_URL=http://127.0.0.1:8100

      # External URLs for browser access
      - APPLICATION_URL=http://100.95.117.40:8000
      - MEDIAMTX_EXTERNAL_BASE_URL=http://100.95.117.40:8889
      - MEDIAMTX_EXTERNAL_HLS_URL=http://100.95.117.40:8888
      - MEDIAMTX_EXTERNAL_PLAYBACK_URL=http://100.95.117.40:9996

      # Path mapping configuration for volume mounts
      - RECORDINGS_HOST_BASE=${RECORDINGS_PATH}
      - RECORDINGS_CONTAINER_BASE=/app/recordings
      - RECORDINGS_BASE_PATH=/app/recordings

      # Security secrets - loaded from .env file
      - SECRET_KEY=${SECRET_KEY}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - MEDIAMTX_SECRET=${MEDIAMTX_SECRET}

      # AI Adapter URL (for Kai-C → ai-adapters routing via supervisord)
      # Override via .env: ADAPTER_URL=http://127.0.0.1:9100 (host) or http://opennvr_ai:9100 (bridge)
      - ADAPTER_URL=${ADAPTER_URL:-http://127.0.0.1:9100}

      # Frames directory — must match the shared_frames volume mount path in this container
      - FRAMES_DIR=/app/AI-adapters/AIAdapters/frames

      # Application settings
      - HOST=${HOST:-0.0.0.0}
      - DEBUG=${DEBUG:-False}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ==========================================
  # 4. AI WORKER (Adapters)
  # ==========================================
  ai-adapters:
    profiles: [ai]
    build:
      context: ../ai-adapter
      dockerfile: Dockerfile
    container_name: opennvr_ai
    restart: unless-stopped
    network_mode: host
    depends_on:
      opennvr-core:
        condition: service_healthy
    volumes:
      - ../ai-adapter/model_weights:/app/model_weights
      - shared_frames:/app/frames

# ==========================================
# VOLUMES
# ==========================================
volumes:
  opennvr_db_data:
  shared_frames:

