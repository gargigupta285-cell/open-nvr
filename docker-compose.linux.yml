# ============================================================
# ⚠️  DEPRECATED — not the canonical Linux compose path anymore.
# ============================================================
#
# As of ISSUE-12 + ISSUE-13, the canonical Linux install path is
# ``docker-compose.tier0.yml`` (or bare ``docker-compose.yml``
# which is an include shim → tier0). This file (``linux.yml``)
# remains available ONLY for operators who specifically need host
# networking for ONVIF WS-Discovery multicast camera auto-discovery
# on a single-LAN topology. In that mode it:
#
#   * is a STRICT FUNCTIONAL SUBSET of tier0.yml — no nginx TLS
#     edge, no YOLOv8 detection out of the box, no NATS events bus;
#   * builds opennvr-core locally from ./Dockerfile (with a pull
#     fallback after ISSUE-11) — heavier first run than tier0.yml
#     which pulls the pre-built GHCR image directly;
#   * uses host networking, so MediaMTX ports bind directly to
#     your host's network stack with no Docker-bridge isolation.
#
# To opt in:
#   OPENNVR_COMPOSE_FILE=docker-compose.linux.yml ./start.sh up
#
# Or directly:
#   docker compose -f docker-compose.linux.yml up -d
#
# Planned removal: v0.2. Track ISSUE-13 follow-up for the
# replacement (a host-mode profile/overlay on tier0.yml that gives
# you ONVIF multicast WITHOUT giving up nginx + detection + nats).
#
# Read more:
#   * Compose file reference: docs/DOCKER_SETUP.md
#   * Why tier0 is canonical: CHANGELOG.md (ISSUE-12 + ISSUE-13)
# ============================================================
#
# Original notes (preserved for context):
# Uses host network mode - required for ONVIF camera discovery on Linux.
# All services share the host network stack (no port mappings needed).
# ============================================================

services:
  # ==========================================
  # 1. DATABASE (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: opennvr_db
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - opennvr_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5

  # ==========================================
  # 2. MEDIAMTX (Streaming Server)
  # ==========================================
  # ==========================================
  # MEDIAMTX CERT INIT (one-shot, host-mode equivalent)
  # ==========================================
  # See docker-compose.yml for full rationale (M1b-fixup-v2 F-9).
  mediamtx-certs-init:
    # ISSUE-7 v6: see docker-compose.tier0.yml for the dl-cdn.
    # alpinelinux.org filter rationale. alpine/openssl ships the
    # openssl CLI pre-baked so no runtime apk fetch is needed.
    image: alpine/openssl:3.3.2
    entrypoint: []
    container_name: opennvr_mediamtx_certs_init
    command:
      - sh
      - -c
      - |
        set -e
        if [ -f /certs/server.crt ] && [ -f /certs/server.key ]; then
          echo "MediaMTX certs already present at /certs/server.{crt,key}; skipping generation."
          exit 0
        fi
        echo "Generating self-signed MediaMTX cert pair (V-019)..."
        umask 077
        openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
          -keyout /certs/server.key -out /certs/server.crt \
          -subj "/CN=opennvr-mediamtx" \
          -addext "subjectAltName=DNS:localhost,DNS:mediamtx,IP:127.0.0.1,IP:::1" \
          -addext "basicConstraints=critical,CA:FALSE" \
          -addext "keyUsage=critical,digitalSignature,keyEncipherment" \
          -addext "extendedKeyUsage=serverAuth"
        chmod 0644 /certs/server.crt
        echo "Wrote /certs/server.crt + /certs/server.key. SAN: localhost, mediamtx, 127.0.0.1, ::1"
    volumes:
      - ./mediamtx-certs:/certs

  mediamtx:
    # Official MediaMTX 1.15.4 + curl for webhooks (runOnInit, runOnRecordSegmentComplete).
    # Multi-stage: mediamtx binary is on scratch so we copy it into Alpine where apk works.
    #
    # M1b-fixup C-2 caveat (host network mode): mediamtx.docker.yml binds
    # rtspsAddress to ":8322" so the bridge-mode compose's port map can
    # enforce loopback-only exposure. With network_mode: host (this file),
    # there is no port map — the listener binds directly to all interfaces
    # on the host. Operators using this compose MUST either:
    #   (a) firewall port 8322 externally, or
    #   (b) override mediamtx.docker.yml with a copy that pins
    #       rtspsAddress: 127.0.0.1:8322 (same for hlsAddress / webrtcAddress).
    # See docs/SECURITY_ARCHITECTURE.md §2.2 and the README Upgrading section.
    build:
      context: .
      dockerfile_inline: |
        # ISSUE-7 v4: see docker-compose.tier0.yml for rationale.
        # curlimages/curl as the final base means curl + its
        # dynamic libs (libcurl.so.4, libssl, libcrypto, ...) are
        # all wired correctly — the v1 alpine + COPY of just the
        # binary left curl unable to load its libs at runtime.
        FROM bluenviron/mediamtx:1.15.4 AS mediamtx-base
        FROM curlimages/curl:8.10.1
        # See docker-compose.tier0.yml for the base-swap checklist
        # this set of overrides exists to satisfy.
        USER root
        WORKDIR /
        CMD []
        COPY --from=mediamtx-base /mediamtx /mediamtx
        ENTRYPOINT ["/mediamtx"]
    container_name: opennvr_mediamtx
    restart: unless-stopped
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
      mediamtx-certs-init:
        condition: service_completed_successfully
    volumes:
      - ./mediamtx.docker.yml:/mediamtx.yml:ro
      # M1b-fixup-v2 F-9: directory mount + auto-generated by the
      # mediamtx-certs-init service above. YAML refers to
      # /etc/mediamtx-certs/server.{crt,key} via absolute paths.
      - ./mediamtx-certs:/etc/mediamtx-certs:ro
      - ${RECORDINGS_PATH:-/home/ubuntu/recordings}:/app/recordings
    environment:
      - MEDIAMTX_SECRET=${MEDIAMTX_SECRET}
      - BACKEND_HOST=127.0.0.1
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - MTX_AUTHJWTJWKS=http://127.0.0.1:${BACKEND_PORT:-8000}/.well-known/jwks.json
      # Host-mode bind: pin the plaintext RTSP listener (used by the
      # KAI-C inference tap) to loopback so it isn't reachable from
      # the LAN. In bridge mode this isn't needed — the container
      # bridge already isolates :8554 — but host mode shares the
      # host's network stack, so we have to be explicit.
      - MTX_RTSPADDRESS=127.0.0.1:8554
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9997/v3/paths/list"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # ==========================================
  # 3. CORE APPLICATION (Backend + Frontend + Kai-C)
  # ==========================================
  opennvr-core:
    # ISSUE-11: pull-or-build pattern. Same shape as tier0.yml and
    # ISSUE-7 v3's yolov8-weights-init. The local Dockerfile build
    # (./Dockerfile) does `RUN apt-get install` for runtime libs
    # (supervisor, gosu, libpq5, libgl1, libglib2.0-0, ...) at both
    # the python-builder stage and the runtime stage. That apt fetch
    # hits deb.debian.org which several operator ISPs (IN, also CN/IR
    # in prior reports) filter — build fails with "Could not connect
    # to debian.map.fastlydns.net" or "Unable to locate package".
    #
    # Fix: declare both `image:` (so Compose pulls the pre-built GHCR
    # image published by .github/workflows/publish-images.yml) AND
    # `build:` (so operators with network access still get the local
    # build path). `pull_policy: missing` makes Compose pull from
    # GHCR first; if the pull succeeds, the local build is skipped
    # entirely and no apt-get runs. If the pull fails (registry
    # unreachable, fresh repo before first publish), Compose falls
    # back to building locally.
    #
    # CORE_TAG defaults to `latest`. Operators on networks that can
    # reach ghcr.io but want to pin a specific release should set
    # CORE_TAG=v0.1.0 (or whatever) in .env.
    image: ghcr.io/open-nvr/core:${CORE_TAG:-latest}
    pull_policy: missing
    build:
      context: .
      dockerfile: Dockerfile

    container_name: opennvr_core
    restart: unless-stopped
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
      mediamtx:
        condition: service_healthy
    volumes:
      - shared_frames:/app/AI-adapters/AIAdapters/frames
      - .:/app/host-root
      - ${RECORDINGS_PATH:-/home/ubuntu/recordings}:/app/recordings
    environment:
      # Host mode: all services reachable via 127.0.0.1
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB}
      - MEDIAMTX_BASE_URL=http://127.0.0.1:8889
      - MEDIAMTX_ADMIN_API=http://127.0.0.1:9997/v3
      - MEDIAMTX_HLS_URL=http://127.0.0.1:8888
      - MEDIAMTX_RTSP_URL=rtsp://127.0.0.1:8554
      - MEDIAMTX_RTSPS_URL=rtsps://127.0.0.1:8322
      - MEDIAMTX_PLAYBACK_URL=http://127.0.0.1:9996
      - KAI_C_URL=http://127.0.0.1:8100

      # External URLs for browser access
      - APPLICATION_URL=http://100.95.117.40:8000
      - MEDIAMTX_EXTERNAL_BASE_URL=http://100.95.117.40:8889
      - MEDIAMTX_EXTERNAL_HLS_URL=http://100.95.117.40:8888
      - MEDIAMTX_EXTERNAL_PLAYBACK_URL=http://100.95.117.40:9996

      # Path mapping configuration for volume mounts
      - RECORDINGS_HOST_BASE=${RECORDINGS_PATH}
      - RECORDINGS_CONTAINER_BASE=/app/recordings
      - RECORDINGS_BASE_PATH=/app/recordings

      # Security secrets - loaded from .env file
      - SECRET_KEY=${SECRET_KEY}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - MEDIAMTX_SECRET=${MEDIAMTX_SECRET}

      # AI Adapter URL (for Kai-C → ai-adapters routing via supervisord)
      # Override via .env: ADAPTER_URL=http://127.0.0.1:9100 (host) or http://opennvr_ai:9100 (bridge)
      - ADAPTER_URL=${ADAPTER_URL:-http://127.0.0.1:9100}

      # Frames directory — must match the shared_frames volume mount path in this container
      - FRAMES_DIR=/app/AI-adapters/AIAdapters/frames

      # Application settings
      - HOST=${HOST:-0.0.0.0}
      - DEBUG=${DEBUG:-False}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ==========================================
  # 4. AI WORKER (Adapters)
  # ==========================================
  ai-adapters:
    profiles: [ai]
    build:
      context: ../ai-adapter
      dockerfile: Dockerfile
    container_name: opennvr_ai
    restart: unless-stopped
    network_mode: host
    depends_on:
      opennvr-core:
        condition: service_healthy
    volumes:
      - ../ai-adapter/model_weights:/app/model_weights
      - shared_frames:/app/frames

# ==========================================
# VOLUMES
# ==========================================
volumes:
  opennvr_db_data:
  shared_frames:

