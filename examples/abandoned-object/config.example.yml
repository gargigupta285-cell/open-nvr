#
# Abandoned-object (unattended-item) example app — config template.
#
# Copy this file to ``config.yml``, fill in the values, and run:
#
#   python abandoned_object.py --config config.yml

# ── NATS endpoint (KAI-C's event bus) ──────────────────────────────
nats_url: "nats://nats:4222"
# nats_url: "nats://127.0.0.1:4222"   # bare-metal / host-mode
nats_token: null

# IMPORTANT: needs per-object identity. Subscribe to a stream whose
# detections carry a ``track_id`` — chain the ``bytetrack`` adapter
# after your detector so a stationary object keeps a stable id.
subject_pattern: "opennvr.inference.>"

# ── What counts as an "object" vs a "person" ──────────────────────
#
# object_labels: the items that can be "abandoned". COCO has
#   backpack / handbag / suitcase; add box etc. if your detector
#   emits them.
# person_label: the label used for owner-proximity suppression.
object_labels:
  - "backpack"
  - "handbag"
  - "suitcase"
person_label: "person"

# ── Abandon predicate ─────────────────────────────────────────────
#
# dwell_seconds:       how long an object must sit still, unattended,
#                      before it's "abandoned".
# move_tolerance_px:   how far (pixels) the object center may drift and
#                      still count as stationary; beyond this the anchor
#                      resets (it was carried, not left).
# person_radius_px:    a person within this many pixels of the object
#                      counts as its owner → suppresses the alert.
# owner_grace_seconds: how recently a person must have been near for
#                      suppression to apply (owner "just stepped away"
#                      window).
# track_ttl_seconds:   forget an object track this long after last sight.
dwell_seconds: 30
move_tolerance_px: 40
person_radius_px: 250
owner_grace_seconds: 10
track_ttl_seconds: 60

# ── Webhook (optional) ────────────────────────────────────────────
webhook_url: null

# ── NATS alert fan-out (optional) ─────────────────────────────────
# Publishes to opennvr.alerts.app.abandoned-object.{camera_id}
nats_alerts_url: null
nats_alerts_token: null

# ── Cameras / zones ───────────────────────────────────────────────
#
# One entry per camera × watched zone. Objects are only candidates
# while their center is inside the zone polygon.
cameras:
  - camera_id: "cam-concourse"
    frame_width: 1920
    frame_height: 1080
    zone_name: "concourse"
    zone:
      - [150, 250]
      - [1770, 250]
      - [1770, 1000]
      - [150, 1000]
