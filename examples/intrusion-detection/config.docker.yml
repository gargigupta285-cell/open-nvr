#
# intrusion-detection config consumed by docker-compose.apps.yml.
#
# Variables of the form ${VAR} are substituted by the
# intrusion-detection-config-init container at compose-up time (busybox
# sed, same pattern as the camera-agent overlay). Only the variables
# listed in the init container are replaced — everything else is left
# untouched.
#
# DO NOT edit the substituted values directly. To change the secret,
# update .env and re-run ``docker compose up`` so the init container
# re-templates the file.

# ── KAI-C endpoint ─────────────────────────────────────────────────
# This is a FrameApp: it DRIVES inference by POSTing polled frames to
# KAI-C's contract proxy. KAI-C runs inside the opennvr-core container
# (bound 0.0.0.0:8100, EXPOSEd) — reachable on the compose network as
# the service name, NOT localhost.
kaic_url: "http://opennvr-core:8100"
kaic_adapter_name: "yolov8"
kaic_api_key: "${INTERNAL_API_KEY}"
# "http" polls per frame; "ws" streams per camera (§6) for sub-second
# alert response at one open connection per camera.
kaic_transport: "http"

# ── Polling cadence ────────────────────────────────────────────────
poll_interval_seconds: 1.0
request_timeout_seconds: 30.0

# ── Detection filter / restricted hours — EDIT for your scene ──────
watch_labels:
  - "person"
# Times in HH:MM (24h, container-local timezone; the image runs UTC
# unless you set TZ). Cross-midnight ranges supported (start > end).
# The full-day default below means "always armed" — narrow it once
# you've verified the install.
restricted_hours:
  start: "00:00"
  end: "23:59"

# ── Alert delivery ─────────────────────────────────────────────────
# Alerts always go to stdout (``docker compose logs intrusion-detection``).
webhook_url: null
# Fan alerts back onto the bus so the operator-UI alerts inbox and any
# other subscriber pick them up without per-app webhooks.
nats_alerts_url: "nats://nats:4222"
nats_alerts_token: "${INTERNAL_API_KEY}"

# ── Cameras — EDIT: frame_url must be a JPEG/PNG snapshot endpoint ──
# file:// http:// https:// are supported (RTSP is a roadmap item).
# Point frame_url at your camera's snapshot URL on the LAN — never
# localhost (that would resolve inside this container).
cameras:
  - camera_id: "cam-1"
    frame_url: "http://192.168.1.50/snapshot.jpg"
    frame_width: 1920
    frame_height: 1080
    zone_name: "full-frame"
    zone:
      - [0, 0]
      - [1920, 0]
      - [1920, 1080]
      - [0, 1080]

# ── App contract (spec §03) — powers the App Catalog ───────────────
# The SDK serves /health /manifest /state on contract_port and
# self-registers with the OpenNVR app registry on boot. The
# registration token comes from the OPENNVR_INTERNAL_API_KEY
# environment variable set by the overlay, so it is not templated here.
contract_port: 9204
contract_bind_host: "0.0.0.0"
contract_host: "intrusion-detection"   # the compose service name
opennvr_url: "http://opennvr-core:8000"
