#
# license-plate-recognition config consumed by docker-compose.apps.yml.
#
# Variables of the form ${VAR} are substituted by the
# license-plate-recognition-config-init container at compose-up time
# (busybox sed, same pattern as the camera-agent overlay). Only the
# variables listed in the init container are replaced — everything else
# is left untouched.
#
# DO NOT edit the substituted values directly. To change the secret,
# update .env and re-run ``docker compose up`` so the init container
# re-templates the file.

# ── KAI-C endpoint (runs inside the opennvr-core container, :8100) ──
# KAI-C proxies inference to the YOLOv8 + fast-plate-ocr adapters and
# audits every call.
kaic_url: "http://opennvr-core:8100"
# The standard stack authenticates internal calls with INTERNAL_API_KEY
# (the X-Internal-Api-Key header value).
kaic_api_key: "${INTERNAL_API_KEY}"

# Adapter names as registered with KAI-C.
detector_adapter: "yolov8"
ocr_adapter: "fast_plate_ocr"

# ── Cameras — EDIT for your scene ───────────────────────────────────
# One entry per camera; frame_url is the camera's JPEG-snapshot
# endpoint (NVR endpoint, ONVIF snapshot, ipcam HTTP, file://, …).
cameras:
  - camera_id: "cam-1"
    frame_url: "http://192.168.1.50/snapshot.jpg"

# ── Pipeline tuning ─────────────────────────────────────────────────
poll_interval_seconds: 2.0
request_timeout_seconds: 30.0
vehicle_labels: ["car", "truck", "bus", "motorcycle"]
detection_confidence: 0.40
ocr_confidence: 0.50
crop_strategy: "lower_third"

# Plate-level dedup: don't re-fire the same plate within this window
# (per camera). Set to 0 to fire every read.
dedup_window_seconds: 60.0

# Optional plate watchlists (case-insensitive). ``allowlist`` reads
# fire low-severity "expected vehicle" alerts; ``denylist`` reads fire
# high-severity "watchlist plate" alerts.
allowlist: []
denylist: []

# ── Alert delivery ──────────────────────────────────────────────────
# Alerts always go to stdout (``docker compose logs license-plate-recognition``).
webhook_url: null
# Fan alerts back onto the bus so the operator-UI alerts inbox and any
# other subscriber pick them up without per-app webhooks.
nats_alerts_url: "nats://nats:4222"
nats_alerts_token: "${INTERNAL_API_KEY}"

# ── App contract (spec §03) — powers the App Catalog ────────────────
# The SDK serves /health /manifest /state on contract_port and
# self-registers with the OpenNVR app registry on boot. The
# registration token comes from the OPENNVR_INTERNAL_API_KEY
# environment variable set by the overlay, so it is not templated here.
contract_port: 9205
contract_bind_host: "0.0.0.0"
contract_host: "license-plate-recognition"   # the compose service name
opennvr_url: "http://opennvr-core:8000"
