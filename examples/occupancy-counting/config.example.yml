#
# Occupancy-counting example app — config template.
#
# Copy this file to ``config.yml``, fill in the values for your
# deployment, and run:
#
#   python occupancy_counting.py --config config.yml

# ── NATS endpoint (KAI-C's event bus) ──────────────────────────────
#
# This app SUBSCRIBES to KAI-C's inference broadcast surface instead
# of driving its own inference. It rides the detection stream another
# app (e.g. intrusion-detection) is already pushing — one inference
# fans out to N counting consumers at zero extra GPU cost.
nats_url: "nats://nats:4222"
# Bare-metal / host-mode deployment:
# nats_url: "nats://127.0.0.1:4222"

# Token-auth secret. Must match the INTERNAL_API_KEY KAI-C uses.
nats_token: null

# Subject pattern. ``opennvr.inference.>`` catches every adapter;
# narrow to ``opennvr.inference.yolov8.>`` for object detection only.
subject_pattern: "opennvr.inference.>"

# ── What to count ─────────────────────────────────────────────────
#
# Only detections with one of these COCO labels (case-folded) are
# counted. ["person"] for room/queue occupancy; ["car","truck","bus"]
# for a parking area; etc.
watch_labels:
  - "person"

# ── Thresholds (app-level defaults; per-camera overrides below) ────
#
# max_occupancy:  fire an OVER alert when the in-zone count exceeds
#                 this. Required (per-camera or here).
# min_occupancy:  optional. Fire an UNDER alert when the in-zone count
#                 drops below this — useful for a post that must always
#                 be staffed. Omit (null) to disable under-occupancy.
max_occupancy: 10
min_occupancy: null

# ── Debounce & clear ──────────────────────────────────────────────
#
# debounce_frames: the new occupancy band must persist this many
#                  consecutive inference frames before an alert fires.
#                  1 = react immediately; raise to 2-3 to ignore a
#                  single noisy frame.
# clear_alerts:    when true, also fire a low-severity CLEARED alert
#                  when a zone returns to normal occupancy. Off by
#                  default (most operators only want the breach).
debounce_frames: 1
clear_alerts: false

# ── Webhook (optional) ────────────────────────────────────────────
#
# Alerts always go to stdout. If set, they're also POSTed as JSON
# (Slack / Discord / Teams / PagerDuty incoming webhooks).
webhook_url: null

# ── NATS alert fan-out (optional) ─────────────────────────────────
#
# Where we PUBLISH our occupancy alerts (distinct from nats_url, where
# we SUBSCRIBE for inference). When set, every alert is published to:
#   opennvr.alerts.app.occupancy-counting.{camera_id}
# nats_alerts_url: "nats://nats:4222"
# nats_alerts_token: "${INTERNAL_API_KEY}"
nats_alerts_url: null
nats_alerts_token: null

# ── Cameras / zones ───────────────────────────────────────────────
#
# One entry per camera × zone you want to count. Each needs:
#   camera_id     — must match the camera_id KAI-C uses in event
#                   subjects (what the upstream inference driver passed).
#   frame_width / frame_height — pixel dimensions (to convert
#                   normalized bboxes back to pixels for zone math).
#   zone_name     — human label shown in alerts.
#   zone          — polygon vertices in pixel coords (>= 3).
#   max_occupancy / min_occupancy — optional per-camera overrides of
#                   the app-level defaults above.
cameras:
  - camera_id: "cam-lobby"
    frame_width: 1920
    frame_height: 1080
    zone_name: "lobby"
    max_occupancy: 25          # fire when > 25 people in the lobby
    zone:
      - [200, 200]
      - [1700, 200]
      - [1700, 950]
      - [200, 950]

  - camera_id: "cam-guard-post"
    frame_width: 1920
    frame_height: 1080
    zone_name: "guard-post"
    max_occupancy: 4
    min_occupancy: 1           # post must always have >= 1 person
    zone:
      - [700, 400]
      - [1200, 400]
      - [1200, 900]
      - [700, 900]
