#
# llama.cpp brain — the LIGHT LLM path. llama.cpp's server image is a few
# hundred MB vs the official Ollama image's ~10 GB (Ollama bundles CUDA/ROCm
# GPU libs you don't use on CPU). The camera-agent talks to llama.cpp's
# OpenAI-compatible API via the existing OpenAI client — no Ollama, no
# model-pull. Rendered by camera-agent-config-init-llamacpp.

text_mode: true

kaic_url: http://opennvr-core:8100
kaic_api_key: ${INTERNAL_API_KEY}

# Point the OpenAI client at the local llama.cpp server. No API key needed.
llm_provider: openai
llm_base_url: http://llamacpp:8080/v1
llm_api_key:
llm_model: qwen3          # llama.cpp serves one loaded model; the name is ignored
llm_think: false          # Qwen3: snappy non-thinking tool-calling
llm_temperature: 0.3
llm_max_tokens: 200

detection_adapter: default
enabled_tools:
  - detect_objects
  - describe_camera
  - recent_events
  - create_monitor
  - create_alarm

frame_cache_ttl_seconds: 2.0
event_ring_size: 128

opennvr_cameras_url: http://opennvr-core:8000/api/v1/internal/camera-agent/cameras
opennvr_api_key: ${INTERNAL_API_KEY}

host: ${CAMERA_AGENT_LISTEN_HOST}
port: 9100
cameras: []

system_prompt: |
  You are a concise camera assistant. Answer ONLY from tool results — call a
  tool before describing what any camera shows; never guess. Keep replies to
  1-2 short sentences.
