  Self-contained demo client for the camera-agent example.

  No build step, no framework, no JS dependencies — vanilla JS.

  Push-to-talk design: the browser records ONE complete utterance with
  the native MediaRecorder API and POSTs the whole blob to /converse.
  The server transcodes it (ffmpeg), transcribes (Whisper), runs the
  tool-calling LLM, synthesises the reply (Piper), and returns
  {transcript, reply, audio_b64} in one response. We play the returned
  WAV directly.

  Why not stream raw PCM? Whisper is a batch transcriber, not a streaming
  ASR. Sending it complete, browser-encoded utterances (instead of a
  hand-resampled PCM stream + hand-rolled VAD) is dramatically more
  reliable and removes the whole class of "You"/"Thank you" hallucinations.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenNVR Camera Agent</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1a1f2a;
      --text: #e6e6e6;
      --muted: #8a93a3;
      --accent: #4fd1c5;
      --accent-strong: #38b2ac;
      --danger: #e53e3e;
      --user: #9ae6b4;
      --agent: #90cdf4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    main {
      width: 100%;
      max-width: 32rem;
      background: var(--panel);
      border-radius: 0.75rem;
      padding: 2rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 0.25rem 0; font-size: 1.5rem; }
    p.lede { margin: 0 0 1.5rem 0; color: var(--muted); }
    .talk {
      width: 100%;
      background: var(--accent);
      color: #062321;
      border: none;
      padding: 1.1rem 1.25rem;
      border-radius: 0.6rem;
      font-weight: 700;
      cursor: pointer;
      font-size: 1.05rem;
      transition: background 0.15s, transform 0.05s;
    }
    .talk:hover:not(:disabled) { background: var(--accent-strong); }
    .talk:active:not(:disabled) { transform: scale(0.99); }
    .talk:disabled { opacity: 0.5; cursor: progress; }
    .talk.recording { background: var(--danger); color: #fff; }
    .talk.recording::before {
      content: "● "; animation: blink 1s steps(2, start) infinite;
    }
    @keyframes blink { to { visibility: hidden; } }
    .row { display: flex; gap: 0.5rem; align-items: center; margin: 1rem 0 0.5rem; }
    .status {
      padding: 0.5rem 0.75rem;
      border-radius: 0.375rem;
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.85rem;
      color: var(--muted);
      flex: 1;
    }
    .status.active { color: var(--accent); }
    .status.error { color: var(--danger); }
    .ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 0.5rem 0.75rem;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .ghost:hover { color: var(--text); }
    .log {
      margin-top: 1rem;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 0.5rem;
      padding: 0.75rem;
      max-height: 16rem;
      overflow-y: auto;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .log:empty::after {
      content: "Your conversation will appear here.";
      color: var(--muted); font-size: 0.82rem;
    }
    .msg { margin: 0.35rem 0; }
    .msg .who { font-weight: 700; }
    .msg.user .who { color: var(--user); }
    .msg.agent .who { color: var(--agent); }
    .msg.sys { color: var(--muted); font-size: 0.8rem; font-style: italic; }
  </style>
</head>
<body>
  <main>
    <h1>OpenNVR Camera Agent</h1>
    <p class="lede">
      Tap <strong>Speak</strong>, ask a question, then tap again to send.
      Try <em>"What do you see on camera one?"</em> or
      <em>"How many people are at the front door?"</em>
    </p>

    <button id="talk" class="talk" type="button">🎤 Speak</button>

    <div class="row">
      <div class="status" id="status">Ready. Tap Speak to begin.</div>
      <button id="reset" class="ghost" type="button">Reset</button>
    </div>

    <div class="log" id="log"></div>
  </main>

  <script>
    const talkBtn  = document.getElementById("talk");
    const resetBtn = document.getElementById("reset");
    const statusEl = document.getElementById("status");
    const logEl    = document.getElementById("log");

    let mediaStream = null;
    let recorder    = null;
    let chunks      = [];
    let recording   = false;
    let busy        = false;

    function setStatus(text, kind = "") {
      statusEl.textContent = text;
      statusEl.className = "status" + (kind ? " " + kind : "");
    }

    function addMsg(text, who) {
      // who: "user" | "agent" | "sys"
      const div = document.createElement("div");
      div.className = "msg " + who;
      if (who === "sys") {
        div.textContent = text;
      } else {
        const label = who === "user" ? "you" : "agent";
        div.innerHTML = `<span class="who">${label}:</span> `;
        div.appendChild(document.createTextNode(text));
      }
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Pick a MIME type the browser actually supports. ffmpeg on the server
    // decodes any of these, so we just take the first that works.
    function pickMimeType() {
      const candidates = [
        "audio/webm;codecs=opus",
        "audio/webm",
        "audio/ogg;codecs=opus",
        "audio/mp4",
      ];
      for (const t of candidates) {
        if (window.MediaRecorder && MediaRecorder.isTypeSupported(t)) return t;
      }
      return ""; // let the browser choose its default
    }

    async function ensureMic() {
      if (mediaStream) return mediaStream;
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
        },
      });
      return mediaStream;
    }

    async function startRecording() {
      try {
        await ensureMic();
      } catch (err) {
        setStatus("Microphone access denied.", "error");
        addMsg("Microphone access denied: " + err, "sys");
        return;
      }
      const mimeType = pickMimeType();
      chunks = [];
      recorder = new MediaRecorder(mediaStream, mimeType ? { mimeType } : undefined);
      recorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
      recorder.onstop = onRecordingStopped;
      recorder.start();
      recording = true;
      talkBtn.textContent = "⏹ Stop & send";
      talkBtn.classList.add("recording");
      setStatus("Listening… tap to send.", "active");
    }

    function stopRecording() {
      if (!recorder || recorder.state === "inactive") return;
      recording = false;
      talkBtn.textContent = "🎤 Speak";
      talkBtn.classList.remove("recording");
      setStatus("Thinking…");
      busy = true;
      talkBtn.disabled = true;
      recorder.stop();
    }

    async function onRecordingStopped() {
      const blob = new Blob(chunks, { type: recorder.mimeType || "audio/webm" });
      if (!blob.size) {
        setStatus("No audio captured. Try again.", "error");
        busy = false; talkBtn.disabled = false;
        return;
      }
      try {
        const resp = await fetch("/converse", {
          method: "POST",
          headers: { "Content-Type": "application/octet-stream" },
          body: blob,
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.error || ("HTTP " + resp.status));
        }
        const data = await resp.json();
        if (!data.transcript) {
          setStatus("Didn't catch that — tap Speak and try again.", "error");
          addMsg("(no speech detected)", "sys");
          return;
        }
        addMsg(data.transcript, "user");
        if (data.reply) addMsg(data.reply, "agent");
        if (data.audio_b64) {
          await playWav(data.audio_b64);
        }
        setStatus("Ready. Tap Speak to ask another.", "active");
      } catch (err) {
        setStatus("Error: " + err.message, "error");
        addMsg("Request failed: " + err.message, "sys");
      } finally {
        busy = false;
        talkBtn.disabled = false;
      }
    }

    function playWav(b64) {
      return new Promise((resolve) => {
        const audio = new Audio("data:audio/wav;base64," + b64);
        audio.onended = resolve;
        audio.onerror = resolve;
        audio.play().catch(resolve);
      });
    }

    talkBtn.addEventListener("click", () => {
      if (busy) return;
      if (recording) stopRecording();
      else startRecording();
    });

    resetBtn.addEventListener("click", async () => {
      try {
        await fetch("/reset", { method: "POST" });
        logEl.innerHTML = "";
        addMsg("Conversation reset.", "sys");
        setStatus("Ready. Tap Speak to begin.");
      } catch { /* ignore */ }
    });
  </script>
</body>
</html>
