<!--

  Self-contained demo client for the camera-agent example.

  No build step, no framework, no JS dependencies — ~200 lines of
  vanilla JS. Connects to the FastAPI WebSocket endpoint and speaks
  raw int16-PCM in both directions (pairs with the camera-agent's
  RawPcmSerializer on the server side). The browser uses the Web
  Audio API for capture (16 kHz mono) and playback (22 kHz mono,
  Piper's default).

  Honest caveats:
  * Voice-only. Transcripts and agent text are not surfaced on the
    page — the RawPcmSerializer drops every non-audio frame on the
    wire so the demo stays vanilla. A production UI bundles
    @pipecat-ai/client-js and the matching ProtobufFrameSerializer
    on the server to get transcripts, control frames, and metrics
    over the same WebSocket.
  * No jitter buffer, no reconnect, no audio worklet — just the
    simplest possible glue. Production deployments will outgrow
    this; that's expected.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenNVR Camera Agent</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1a1f2a;
      --text: #e6e6e6;
      --muted: #8a93a3;
      --accent: #4fd1c5;
      --accent-strong: #38b2ac;
      --danger: #e53e3e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    main {
      width: 100%;
      max-width: 32rem;
      background: var(--panel);
      border-radius: 0.75rem;
      padding: 2rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 0.25rem 0; font-size: 1.5rem; }
    p.lede { margin: 0 0 1.5rem 0; color: var(--muted); }
    .row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
    button {
      background: var(--accent);
      color: #062321;
      border: none;
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button:hover:not(:disabled) { background: var(--accent-strong); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.danger { background: var(--danger); color: white; }
    .status {
      padding: 0.5rem 0.75rem;
      border-radius: 0.375rem;
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.85rem;
      color: var(--muted);
      flex: 1;
    }
    .status.active { color: var(--accent); }
    .log {
      margin-top: 1rem;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 0.5rem;
      padding: 0.75rem;
      max-height: 12rem;
      overflow-y: auto;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .log-entry { margin: 0.15rem 0; }
    .log-entry.error { color: var(--danger); }
  </style>
</head>
<body>
  <main>
    <h1>OpenNVR Camera Agent</h1>
    <p class="lede">
      Click <strong>Start</strong>, then speak. The agent listens via
      Silero VAD — no need to hold a button. Ask things like
      <em>"What's on the front porch?"</em> or
      <em>"Did anyone come to the door in the last hour?"</em>
    </p>
    <div class="row">
      <button id="start" type="button">Start</button>
      <button id="stop" type="button" class="danger" disabled>Stop</button>
      <div class="status" id="status">Idle. Click Start.</div>
    </div>
    <div class="log" id="log"></div>
  </main>

  <script>
    // ── Minimal raw-PCM WebSocket client ────────────────────────────
    //
    // Pairs with examples/camera-agent/serializer.py (RawPcmSerializer).
    // Both directions of the WebSocket carry bare int16 little-endian
    // PCM samples — inbound at 16 kHz (Silero VAD's expected rate),
    // outbound at the Piper TTS sample rate (typically 22 kHz). No
    // framing, no protobuf, no JS dep — just bytes.
    //
    // Production UIs that want transcripts / control frames /
    // metrics on the wire should swap to Pipecat's
    // ProtobufFrameSerializer on the server and bundle
    // @pipecat-ai/client-js in the browser.

    const startBtn = document.getElementById("start");
    const stopBtn = document.getElementById("stop");
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");

    let ws = null;
    let audioCtx = null;
    let mediaStream = null;
    let workletNode = null;
    let playbackQueue = [];

    function setStatus(text, active = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle("active", active);
    }

    function log(msg, kind = "info") {
      const entry = document.createElement("div");
      entry.className = `log-entry ${kind}`;
      const now = new Date().toLocaleTimeString();
      entry.textContent = `[${now}] ${msg}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function start() {
      startBtn.disabled = true;
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            sampleRate: 16000,
            echoCancellation: true,
            noiseSuppression: true,
          },
        });
      } catch (err) {
        log(`Microphone access denied: ${err}`, "error");
        setStatus("Microphone access denied.");
        startBtn.disabled = false;
        return;
      }

      const wsUrl = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`;
      ws = new WebSocket(wsUrl);
      ws.binaryType = "arraybuffer";

      ws.onopen = async () => {
        setStatus("Connected. Listening — just speak.", true);
        stopBtn.disabled = false;
        log("WebSocket open");

        audioCtx = new (window.AudioContext || window.webkitAudioContext)({
          sampleRate: 16000,
        });
        const source = audioCtx.createMediaStreamSource(mediaStream);

        // ScriptProcessor is deprecated but works everywhere without
        // an AudioWorklet build step. For v0.1 demo simplicity, fine.
        const proc = audioCtx.createScriptProcessor(4096, 1, 1);
        proc.onaudioprocess = (ev) => {
          if (!ws || ws.readyState !== WebSocket.OPEN) return;
          const f32 = ev.inputBuffer.getChannelData(0);
          const i16 = floatToPcm16(f32);
          ws.send(i16.buffer);
        };
        source.connect(proc);
        proc.connect(audioCtx.destination);
        workletNode = proc;
      };

      ws.onmessage = (ev) => {
        if (typeof ev.data === "string") {
          // Server-side transcript / status JSON messages.
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === "transcript") {
              log(`${msg.role === "user" ? "you" : "agent"}: ${msg.text}`);
            }
          } catch {
            log(ev.data);
          }
        } else {
          // Binary audio chunk — append to playback queue.
          enqueuePlayback(new Int16Array(ev.data));
        }
      };

      ws.onerror = () => log("WebSocket error", "error");
      ws.onclose = () => {
        setStatus("Disconnected.");
        log("WebSocket closed");
        cleanup();
      };
    }

    function stop() {
      setStatus("Stopping…");
      if (ws && ws.readyState === WebSocket.OPEN) ws.close();
      cleanup();
    }

    function cleanup() {
      if (workletNode) { workletNode.disconnect(); workletNode = null; }
      if (audioCtx) { audioCtx.close().catch(() => {}); audioCtx = null; }
      if (mediaStream) {
        mediaStream.getTracks().forEach((t) => t.stop());
        mediaStream = null;
      }
      ws = null;
      startBtn.disabled = false;
      stopBtn.disabled = true;
    }

    function floatToPcm16(f32) {
      const out = new Int16Array(f32.length);
      for (let i = 0; i < f32.length; i++) {
        const s = Math.max(-1, Math.min(1, f32[i]));
        out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
      }
      return out;
    }

    // ── Playback (very small, single-shot per chunk) ────────────────
    let playbackCtx = null;
    let playbackTime = 0;
    function enqueuePlayback(pcm16) {
      if (!playbackCtx) {
        playbackCtx = new (window.AudioContext || window.webkitAudioContext)({
          sampleRate: 22050,  // Piper default
        });
        playbackTime = playbackCtx.currentTime;
      }
      const buf = playbackCtx.createBuffer(1, pcm16.length, playbackCtx.sampleRate);
      const ch = buf.getChannelData(0);
      for (let i = 0; i < pcm16.length; i++) {
        ch[i] = pcm16[i] / 0x8000;
      }
      const node = playbackCtx.createBufferSource();
      node.buffer = buf;
      node.connect(playbackCtx.destination);
      const startAt = Math.max(playbackCtx.currentTime, playbackTime);
      node.start(startAt);
      playbackTime = startAt + buf.duration;
    }

    startBtn.addEventListener("click", start);
    stopBtn.addEventListener("click", stop);
  </script>
</body>
</html>
