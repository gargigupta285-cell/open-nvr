#
# Docker LITE config — rendered by camera-agent-config-init-lite. Text chat
# only (POST /ask), detection-grounded skills, small LLM. No Whisper/Piper/BLIP
# are referenced, so the lite compose profile doesn't run those heavy services
# (issue #82). ${...} placeholders are substituted from .env at boot.

text_mode: true

kaic_url: http://opennvr-core:8100
kaic_api_key: ${INTERNAL_API_KEY}

# Local small LLM by default. To use a cloud brain instead, set
# llm_provider: openai + llm_base_url + llm_api_key (see config.cloud.yml).
ollama_url: http://ollama:11434
ollama_token:
llm_model: ${OLLAMA_MODEL}
llm_temperature: 0.3
llm_max_tokens: 200

# Only the YOLOv8 detector is needed for lite. describe_camera falls back to
# the detector when no caption adapter is present.
detection_adapter: default
enabled_tools:
  - detect_objects
  - describe_camera
  - recent_events
  - create_monitor
  - create_alarm

frame_cache_ttl_seconds: 2.0
event_ring_size: 128

# Reuse OpenNVR's configured cameras (MediaMTX tap URLs).
opennvr_cameras_url: http://opennvr-core:8000/api/v1/internal/camera-agent/cameras
opennvr_api_key: ${INTERNAL_API_KEY}

host: ${CAMERA_AGENT_LISTEN_HOST}
port: 9100
cameras: []

system_prompt: |
  You are a concise camera assistant. Answer ONLY from tool results — call a
  tool before describing what any camera shows; never guess. Keep replies to
  1-2 short sentences.
