#
# Sample config for the camera-agent example app.
# Copy to config.yml, edit, then start the server:
#
#   python camera_agent.py --config config.yml
#
# Then visit http://localhost:9100/demo in your browser.

# REQUIRED — KAI-C base URL and key. KAI-C audits every inference
# the agent makes against your cameras. The agent does NOT bypass
# KAI-C for the tool calls (camera scene description, object
# detection, face recognition) — those still flow through the
# proxy. Only the streaming voice path (Whisper / Ollama / Piper)
# talks to the adapters directly because KAI-C v0.1 doesn't proxy
# streaming yet. Documented as such in the README.
kaic_url: http://127.0.0.1:8100
kaic_api_key: REPLACE_WITH_INTERNAL_API_KEY

# Direct URLs for the streaming adapters (Whisper for STT, Ollama
# for LLM, Piper for TTS). The agent uses the adapters' /infer
# endpoints over HTTP with bearer-token auth. These three URLs
# are bypassing KAI-C for v0.1 — see the note above and the
# README "audit chain" section.
whisper_url: http://127.0.0.1:9003
whisper_token: REPLACE_WITH_OPENNVR_ADAPTER_TOKEN
ollama_url: http://127.0.0.1:9004
ollama_token: REPLACE_WITH_OPENNVR_ADAPTER_TOKEN
piper_url: http://127.0.0.1:9001
piper_token: REPLACE_WITH_OPENNVR_ADAPTER_TOKEN

# The agent has no persona name — it presents as "the OpenNVR camera agent"
# (chat label "agent"). This value is only used for event metadata and, if you
# turn it on, the OPTIONAL wake word ("Hey <agent_name>"). Leave it as-is unless
# you want a named wake word (then pick a name STT transcribes reliably).
agent_name: Camera Agent
voice_gender: neutral   # neutral | female | male (pairs the Piper voice)

# Talking-avatar video in the demo. true = play the bundled clips
# (demo/avatar/{idle,speaking,thinking}.{webm,mp4}); swap in your own export
# (e.g. HeyGen) by replacing those files. false = use the built-in animated SVG
# face only. The 'thinking' clip is optional — it falls back to idle if absent.
avatar_video: true

# Wake word — OPTIONAL, for ambient/always-on clients. The built-in demo uses
# click-to-talk (tap Talk → it listens, answers every utterance, auto-stops on
# a quiet spell), so it never gates on the wake word. This setting only affects
# callers of /converse that don't pass ?wake=0 — e.g. an always-listening
# surface, where answering only when addressed by name ("Hey <agent_name>, …") stops it
# reacting to the TV or its own echoed reply. Spellings match exactly + a tight
# fuzzy net (wake_fuzzy 0.85) catches close STT drift; an address word
# ("hey/ok") is required.
wake_word_required: true
# wake_words: ["camera"]        # extra exact wake words STT hears reliably
# wake_fuzzy: 0.85              # 1.0 = exact only; < 0.85 = more forgiving
# wake_require_prefix: true     # false = the bare name (no "hey") also wakes

# Names of the vision adapters used by tool calls. The agent calls
# these THROUGH KAI-C (auditable, since they're event-driven not
# streaming).
detection_adapter: yolov8
recognition_adapter: insightface
caption_adapter: blip

# LLM model + sampling. Default qwen2.5:1.5b (~1GB RAM, Apache-2.0,
# non-thinking) is the sweet spot for tool-calling on CPU. Drop to
# qwen2.5:0.5b on very low RAM, or use qwen2.5:3b for better grounding
# at more RAM and slower inference. The model MUST support tools —
# see https://ollama.com/blog/tool-support for the current list.
llm_model: qwen2.5:1.5b
llm_temperature: 0.4
llm_max_tokens: 256

# How long to keep a fetched camera frame in cache. The LLM often
# calls multiple tools on the same camera (describe + detect +
# recognise faces) inside one turn; caching avoids fetching the
# frame three times. 2 seconds is short enough that "what's at the
# door right now?" still gets a fresh frame on each new question.
frame_cache_ttl_seconds: 2.0

# How many recent inference events to remember per camera. The
# recent_events tool answers questions like "did anyone come to
# the door in the last 30 minutes?" against this in-memory ring
# buffer. Set higher if you want a longer lookback; each event is
# a few hundred bytes.
event_ring_size: 256

# NATS connection for inference events. Optional but recommended —
# without it, the recent_events tool always returns an empty list.
# nats_inference_url: nats://127.0.0.1:4222
# nats_inference_token: # leave unset for anonymous

# Optional: path to the footage-search SQLite index. When set (and the
# index has been built by the footage-search example's `index`
# subcommand), the agent gains a `search_footage` tool so the user can
# ask about the recorded past in natural language — "did a red truck
# come by the dock earlier?". Without it, that tool reports it's
# unavailable. Point this at the same db_path the footage-search
# indexer writes to.
# footage_index_path: /data/footage_index.sqlite3

# Optional: auto-discover cameras from a running OpenNVR instance.
# When set and the `cameras` list below is empty, the agent calls
# GET <opennvr_cameras_url> (auth: X-Internal-Api-Key) and builds
# its camera roster from the response. This lets you add / remove
# cameras in OpenNVR without editing this config — the agent
# picks up the current list on every restart.
#
# Use the same INTERNAL_API_KEY you configured in OpenNVR's .env.
# The endpoint returns MediaMTX tap URLs when INFERENCE_USE_MEDIAMTX_TAP
# is true (default), otherwise falls back to the stored RTSP URL —
# so you never need to put camera passwords in this file.
#
# Example (OpenNVR running on the same machine):
# opennvr_cameras_url: http://127.0.0.1:8000/api/v1/internal/camera-agent/cameras
# opennvr_api_key: REPLACE_WITH_INTERNAL_API_KEY

# Base URL of the main OpenNVR UI. Used ONLY to deep-link the operator to
# the AI Adapters view when a skill is greyed out for want of a backing
# adapter — the skills panel then shows an "Enable →" link next to the
# suggested adapter(s). The agent guides you there; it never enables or
# approves an adapter itself (that stays your action, behind the permission
# gate). When unset, no link is shown — just the suggestion text.
# opennvr_ui_url: https://nvr.example

# HTTP listen address for the agent. Public if you put it behind
# your reverse proxy; localhost only by default.
host: 127.0.0.1
port: 9100

# Cameras the agent knows about. Each entry contributes a sentence
# to the LLM's system prompt ("front-porch is the main entrance...")
# so the model can pick the right camera_id when the user asks
# "what's at the front door?" without naming it explicitly.
cameras:
  - camera_id: front-porch
    frame_url: http://192.168.1.50/cgi-bin/snapshot.cgi
    role: "The main entrance to the house, faces the street and driveway."
  # - camera_id: back-door
  #   frame_url: http://192.168.1.51/snapshot.jpg
  #   role: "The back door, faces the garden. Rarely used during the day."

# The system prompt sets the agent's voice + behaviour. Keep it
# short — the model sees it on every turn. Per-camera ``role``
# fields above are appended automatically.
system_prompt: |
  You are a helpful, concise voice assistant for a home with security
  cameras. The user asks questions about what's happening on those
  cameras. Always use your tools to ground answers in live camera
  data — don't guess. Respond in 1-2 short sentences because your
  reply is spoken aloud. If the user's question can't be answered
  from the cameras, say so briefly.
