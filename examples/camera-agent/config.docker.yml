#
# camera-agent config consumed by docker-compose.camera-agent.yml.
#
# Variables of the form ${VAR} are substituted by the
# camera-agent-config-init container at compose-up time using
# envsubst. Only the variables explicitly listed in the init
# container's envsubst invocation are replaced — everything else
# (e.g. the system_prompt multi-line block) is left untouched.
#
# DO NOT edit the substituted values directly. To change a secret,
# update .env and re-run ``docker compose up`` so the init container
# re-templates the file.

# KAI-C inside opennvr-core. Adapter calls flow here for audit.
kaic_url: http://opennvr-core:8100
kaic_api_key: ${INTERNAL_API_KEY}

# Streaming voice path — direct to the monolithic ai-adapter image
# which serves Whisper STT + Piper TTS + the Ollama wrapper on
# port 9100. v0.1.1 will split these into per-adapter images on
# their canonical ports (9001 piper, 9003 whisper) and replace this
# overlay's ``ai-adapter`` service with three lighter pulls.
whisper_url: http://ai-adapter:9100
whisper_token: ${INTERNAL_API_KEY}
ollama_url: http://ai-adapter:9100
ollama_token: ${INTERNAL_API_KEY}
piper_url: http://ai-adapter:9100
piper_token: ${INTERNAL_API_KEY}

# Vision tools — routed through KAI-C by the registered adapter NAME.
# The Tier 0 stack registers ONLY the YOLOv8 object detector, under the
# name ``default`` — so detect_objects must target ``default``.
# BLIP (caption) and InsightFace (recognition) are NOT registered in the
# Tier 0 KAI-C, so describe_camera / recognize_faces will report they're
# unavailable until those adapters are registered. (They still point at
# their intended names so they light up automatically once registered.)
detection_adapter: default
recognition_adapter: insightface
caption_adapter: blip

# Tools advertised to the LLM. Tier 0 only registers the YOLOv8 object
# detector, so the demo exposes just the two tools that actually work:
# detect_objects (counts people/cars/…) and describe_camera (which falls
# back to the detector when no caption adapter is present). This keeps the
# prompt short (faster CPU prefill) and stops the model calling face
# recognition / footage search whose adapters aren't deployed. Add names
# here once you register BLIP / InsightFace / the footage index.
enabled_tools:
  - detect_objects
  - describe_camera

# LLM tuning. llama3.2:3b is the docker-compose.camera-agent.yml
# default — fits comfortably in 3 GB of RAM at ~5-15 tok/s on CPU.
# Bump to llama3.1:8b-instruct for better tool-calling quality if
# you have the RAM (~6 GB). Whichever model you pick, it MUST
# support tool calling — see https://ollama.com/blog/tool-support.
llm_model: ${OLLAMA_MODEL}
llm_temperature: 0.4
llm_max_tokens: 256

frame_cache_ttl_seconds: 2.0
event_ring_size: 256

# NATS broadcast — picks up inference events fanned out by KAI-C so
# the recent_events tool can answer "did anyone walk past in the
# last 30 minutes?". The token matches the NATS --auth value in the
# Tier 0 compose (which uses INTERNAL_API_KEY).
nats_inference_url: nats://nats:4222
nats_inference_token: ${INTERNAL_API_KEY}

# Load cameras from OpenNVR. OpenNVR returns internal MediaMTX frame-source
# URLs, so camera-agent reuses the stream OpenNVR already manages instead of
# storing camera RTSP credentials in this example config.
opennvr_cameras_url: http://opennvr-core:8000/api/v1/internal/camera-agent/cameras
opennvr_api_key: ${INTERNAL_API_KEY}

host: ${CAMERA_AGENT_LISTEN_HOST}
port: 9100

# Optional manual fallback. Leave empty in Docker so camera-agent uses the
# OpenNVR-configured cameras from opennvr_cameras_url above.
cameras: []

system_prompt: |
  You are a concise voice assistant for a home security camera system.
  You have NO knowledge of what any camera currently shows — the ONLY
  way to know is to call a tool.

  RULES:
  - For ANY question about what a camera sees, what is happening, who or
    what is present, or how many of something, you MUST call detect_objects
    or describe_camera BEFORE answering.
  - NEVER invent, guess, or describe what is on a camera from imagination.
    If you have not called a tool this turn, you do not know.
  - Base your answer ONLY on the tool result, in 1-2 short spoken sentences.
  - If a tool says a camera cannot be reached, tell the user that camera
    appears to be offline.
