#
# Docker CHAT config — rendered by camera-agent-config-init-chat.
# Text chat (POST /ask) with scene description/VQA via the BLIP caption adapter.
# Runs detector + BLIP + small LLM — NO Whisper/Piper voice stack. The lighter
# way to run the same camera-agent (no microphone/speaker). ${...} placeholders
# are substituted from .env at boot.

text_mode: true

kaic_url: http://opennvr-core:8100
kaic_api_key: ${INTERNAL_API_KEY}

ollama_url: http://ollama:11434
ollama_token:
llm_model: ${OLLAMA_MODEL}
llm_think: false   # Qwen3 default: snappy non-thinking tool-calling
llm_temperature: 0.3
llm_max_tokens: 220

# detect_objects -> YOLOv8 (name "default"); describe_camera -> the caption/VQA
# adapter selected by CAPTION_ADAPTER (auto-registered by caption-adapter-register
# once healthy). describe_camera falls back to the detector until it registers.
detection_adapter: default
caption_adapter: ${CAPTION_ADAPTER}   # moondream (default) — auto-registered by caption-adapter-register
recognition_adapter: insightface

enabled_tools:
  - detect_objects
  - describe_camera
  - recent_events
  - create_monitor
  - create_alarm

frame_cache_ttl_seconds: 2.0
event_ring_size: 256

opennvr_cameras_url: http://opennvr-core:8000/api/v1/internal/camera-agent/cameras
opennvr_api_key: ${INTERNAL_API_KEY}

# Browser-facing OpenNVR origin — feeds opennvr_ui_url (deep-links to AI
# Adapters / App Catalog when a skill is greyed out). The HOST origin the
# operator's browser reaches OpenNVR at; defaults to http://localhost:8000.
# Override via OPENNVR_UI_URL in .env for LAN/remote installs.
opennvr_base_url: ${OPENNVR_UI_URL}

# App door (read-only): fetched FROM INSIDE the container — must be the
# compose-internal service name, NOT the browser-facing URL, or the app door
# silently never works under compose (localhost:8000 = the agent itself).
opennvr_api_url: http://opennvr-core:8000

nats_inference_url: nats://nats:4222
nats_inference_token: ${INTERNAL_API_KEY}

host: ${CAMERA_AGENT_LISTEN_HOST}
port: 9100
cameras: []

system_prompt: |
  You are a concise camera assistant. Answer ONLY from tool results — call a
  tool before describing what any camera shows; never guess. Prefer
  describe_camera for "what's happening / what do you see" questions and
  detect_objects for counting. Keep replies to 1-2 short sentences.
