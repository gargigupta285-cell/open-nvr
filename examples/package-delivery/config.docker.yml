#
# package-delivery config consumed by docker-compose.apps.yml.
#
# Variables of the form ${VAR} are substituted by the
# package-delivery-config-init container at compose-up time (busybox
# sed, same pattern as the camera-agent overlay). Only the variables
# listed in the init container are replaced — everything else is left
# untouched.
#
# DO NOT edit the substituted values directly. To change the secret,
# update .env and re-run ``docker compose up`` so the init container
# re-templates the file.

# ── KAI-C (proxies + audits the YOLOv8 detection call) ─────────────
# Unlike the NATS-riding detectors, package-delivery is a FrameApp:
# it fetches camera frames itself and drives inference through KAI-C
# (compose service ``opennvr-core``, KAI-C on :8100).
kaic_url: "http://opennvr-core:8100"
kaic_api_key: "${INTERNAL_API_KEY}"

# The standard stack registers the YOLOv8 object detector with KAI-C
# under the name ``default`` (not ``yolov8``).
detector_adapter: "default"

# ── Cameras — EDIT for your scene ──────────────────────────────────
# One entry per porch camera. frame_url is the camera's JPEG snapshot
# endpoint (Reolink / Hikvision / Frigate-style); it must be reachable
# FROM INSIDE the container, so use a LAN IP, not localhost. A camera
# whose snapshot fetch fails is logged and retried next poll — the
# daemon keeps running.
cameras:
  - camera_id: "front-porch"
    frame_url: "http://192.168.1.50/cgi-bin/snapshot.cgi"
    # Optional porch ROI in normalised [0..1] coordinates — a list of
    # [x, y] points (3+ vertices) or a [x1, y1, x2, y2] rectangle.
    # Unset ⇒ the whole frame is searched.
    # roi: [0.10, 0.40, 0.85, 0.95]

# ── Detection / state-machine knobs — EDIT for your scene ──────────
poll_interval_seconds: 3.0
request_timeout_seconds: 30.0
package_labels:
  - suitcase
  - backpack
  - handbag
person_labels:
  - person
detection_confidence: 0.35
iou_threshold: 0.30
arrive_consecutive_hits: 2
gone_consecutive_misses: 3
# 0 disables the "package still sitting there" reminder.
linger_alert_after_seconds: 0
# Person-seen window for owner-vs-stranger; 0 disables the heuristic.
pickup_person_lookback_seconds: 8.0
dedup_window_seconds: 30.0

# ── Alert delivery ─────────────────────────────────────────────────
# Alerts always go to stdout (``docker compose logs package-delivery``).
webhook_url: null
# Fan alerts back onto the bus so the operator-UI alerts inbox and any
# other subscriber (e.g. home-assistant-relay) pick them up.
nats_alerts_url: "nats://nats:4222"
nats_alerts_token: "${INTERNAL_API_KEY}"
attach_snapshot_on_alerts: true
snapshot_max_bytes: 716800

# ── App contract (spec §03) — powers the App Catalog ───────────────
# The SDK serves /health /manifest /state on contract_port and
# self-registers with the OpenNVR app registry on boot. The
# registration token comes from the OPENNVR_INTERNAL_API_KEY
# environment variable set by the overlay, so it is not templated here.
contract_port: 9207
contract_bind_host: "0.0.0.0"
contract_host: "package-delivery"   # the compose service name
opennvr_url: "http://opennvr-core:8000"
