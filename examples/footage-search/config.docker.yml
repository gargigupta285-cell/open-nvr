#
# footage-search config consumed by docker-compose.apps.yml.
#
# Variables of the form ${VAR} are substituted by the
# footage-search-config-init container at compose-up time (busybox
# sed, same pattern as the camera-agent overlay). Only the variables
# listed in the init container are replaced — everything else is left
# untouched.
#
# DO NOT edit the substituted values directly. To change the secret,
# update .env and re-run ``docker compose up`` so the init container
# re-templates the file.

# ── Index location ──────────────────────────────────────────────────
# /app/data is a named Docker volume (opennvr_footage_search_data), so
# the index survives container restarts and image rebuilds. Both the
# ``index`` daemon and ``search`` invocations read the same path.
db_path: "/app/data/footage_index.sqlite3"

# ── NATS endpoint (KAI-C's event bus, compose service ``nats``) ────
nats_url: "nats://nats:4222"
# The standard stack runs NATS with ``--auth INTERNAL_API_KEY``.
nats_token: "${INTERNAL_API_KEY}"

# Subscribe to detector events (labels) AND captioner events (scene
# text). The wildcard catches both; the indexer merges a detection
# event and a caption event that share a correlation_id into one
# searchable keyframe.
subject_pattern: "opennvr.inference.>"

# ── Search vocabulary — EDIT for your scene ────────────────────────
# extra_labels: object classes beyond the built-in COCO-ish vocabulary
# that your detector emits (parsed as labels, not free-text keywords).
extra_labels: []

# camera_aliases: words a user might say mapped to the camera_id
# KAI-C uses, e.g. ``dock: "cam-dock"``.
camera_aliases: {}

# Max results returned by a search.
result_limit: 25

# ── Optional LLM query parsing (Ollama) ────────────────────────────
# When enabled, queries are parsed by a local Ollama model (e.g. the
# camera-agent overlay's ``ollama`` service) instead of the built-in
# heuristic parser. Falls back to the heuristic parser on any error.
ollama:
  enabled: false
  url: "http://ollama:11434"
  model: "llama3.2"

# ── App contract (spec §03) — serves /health /manifest /state and the
# POST /actions search surface on :9208; self-registers with the app
# registry so the catalog shows a live status dot, state views, and
# the "Search footage" action form. The registration/config-poll token
# rides the OPENNVR_INTERNAL_API_KEY env var the overlay sets.
contract_port: 9208
contract_host: "footage-search"
opennvr_url: "http://opennvr-core:8000"
