# ─────────────────────────────────────────────────────────────────────
# OpenNVR App Store — the curated "discover" index of installable apps.
#
# Product-owned and editorial by design (same shape as use_case_map.yml):
# this is the browse-and-install catalog the App Catalog UI reads via
# GET /api/v1/apps/index. Each entry is seeded from a shipped example
# under examples/<id>/ — id / name / summary / category / version /
# requires_tasks / emits mirror that app's AppManifest, docs_url points
# at its README, and `install` is the exact copy-paste an operator runs.
#
# EVERY ENTRY IS INSTALLABLE, BY CONSTRUCTION. An entry's id MUST exist
# as a service in docker-compose.apps.yml — the one-click reconciler and
# the copy-paste command both run `docker compose … up -d <id>` against
# that overlay, so a listing without a service block fails on install.
# scripts/validate_apps_index.py enforces this (a review found 8 of 10
# original entries listed apps with no service block — every install
# path failed with "no such service"; all 8 have since been restored
# WITH their service blocks). See docs/CONTRIBUTING_APPS.md.
#
# IMAGES ARE NOT PUBLISHED YET. Unlike the adapters and core (which pull
# from ghcr.io/open-nvr/*), the detector apps ship only as a build
# overlay today (docker-compose.apps.yml uses `build:` +
# opennvr/<id>:local-build). The `image` field below records the
# CANONICAL intended GHCR ref (ghcr.io/open-nvr/<id>:latest) for when
# publishing lands; `build_context` names the source folder explicitly.
#
# NO SECRETS in this file — the compose snippets reference
# ${INTERNAL_API_KEY} from the operator's .env, never a literal.
#
# ADDING YOUR APP? This is a curated, reviewed index. Append ONE entry
# (copy docs/apps-index-entry.template.yml), add your service block to
# docker-compose.apps.yml, run `make validate-apps-index`, and open a
# PR. Full submission flow + trust model: docs/CONTRIBUTING_APPS.md.
# ─────────────────────────────────────────────────────────────────────

- id: loitering-detection
  name: Loitering Detection
  summary: Alerts when a watched object dwells in a zone beyond a threshold.
  category: perimeter
  version: 1.0.0
  image: ghcr.io/open-nvr/loitering-detection:latest
  build_context: examples/loitering-detection
  requires_tasks: [object_detection]
  emits: [loitering]
  docs_url: https://github.com/open-nvr/open-nvr/blob/main/examples/loitering-detection/README.md
  install:
    compose: |
      # INFORMATIONAL — this service already ships in
      # docker-compose.apps.yml (with its config-init companion and
      # named config volume); you do NOT paste this anywhere. Run the
      # command below and compose brings it up from the shipped overlay.
      services:
        loitering-detection:
          profiles: [apps]
          image: ${LOITERING_DETECTION_IMAGE:-opennvr/loitering-detection:local-build}
          restart: unless-stopped
          environment:
            - OPENNVR_INTERNAL_API_KEY=${INTERNAL_API_KEY}
            - NATS_URL=nats://nats:4222
            - OPENNVR_URL=http://opennvr-core:8000
          expose:
            - "9200"
          networks:
            - opennvr_internal
    command: docker compose -f docker-compose.yml -f docker-compose.apps.yml --profile apps up -d loitering-detection

