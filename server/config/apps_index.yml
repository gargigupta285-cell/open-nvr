# ─────────────────────────────────────────────────────────────────────
# OpenNVR App Store — the curated "discover" index of installable apps.
#
# Product-owned and editorial by design (same shape as use_case_map.yml):
# this is the browse-and-install catalog the App Catalog UI reads via
# GET /api/v1/apps/index. Each entry is seeded from a shipped example
# under examples/<id>/ — id / name / summary / category / version /
# requires_tasks / emits mirror that app's AppManifest, docs_url points
# at its README, and `install` is the exact copy-paste an operator runs.
#
# IMAGES ARE NOT PUBLISHED YET. Unlike the adapters and core (which pull
# from ghcr.io/open-nvr/*), the detector apps ship only as a build
# overlay today (docker-compose.apps.yml uses `build:` +
# opennvr/<id>:local-build). The `image` field below records the
# CANONICAL intended GHCR ref (ghcr.io/open-nvr/<id>:latest) for when
# publishing lands; until then the `install.compose` snippet carries a
# `build.context: .` + `build.dockerfile: examples/<id>/Dockerfile` so
# the copy-paste actually works, and `build_context` names the source
# folder explicitly.
#
# NO SECRETS in this file — the compose snippets reference
# ${INTERNAL_API_KEY} from the operator's .env, never a literal.
# ─────────────────────────────────────────────────────────────────────

- id: loitering-detection
  name: Loitering Detection
  summary: Alerts when a watched object dwells in a zone beyond a threshold.
  category: perimeter
  version: 1.0.0
  image: ghcr.io/open-nvr/loitering-detection:latest
  build_context: examples/loitering-detection
  requires_tasks: [object_detection]
  emits: [loitering]
  docs_url: examples/loitering-detection/README.md
  install:
    compose: |
      services:
        loitering-detection:
          profiles: [apps]
          build:
            context: .
            dockerfile: examples/loitering-detection/Dockerfile
          image: ghcr.io/open-nvr/loitering-detection:latest
          restart: unless-stopped
          environment:
            - OPENNVR_INTERNAL_API_KEY=${INTERNAL_API_KEY}
            - NATS_URL=nats://nats:4222
            - OPENNVR_URL=http://opennvr-core:8000
          expose:
            - "9200"
          networks:
            - opennvr_internal
    command: docker compose -f docker-compose.yml -f docker-compose.apps.yml --profile apps up -d loitering-detection

