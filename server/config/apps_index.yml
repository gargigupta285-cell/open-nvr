- id: home-assistant-relay
  name: Home Assistant Relay
  summary: Bridges the opennvr.alerts.* fan-out into Home Assistant entities via MQTT discovery or the HA REST API, with auto-off windows so sensors read like an event log.
  category: integration
  version: "1.0.0"
  image: ghcr.io/open-nvr/home-assistant-relay:latest
  build_context: examples/home-assistant-relay
  requires_tasks: []
  emits: []
  docs_url: https://github.com/open-nvr/open-nvr/blob/main/examples/home-assistant-relay/README.md
  install:
    compose: |
      # INFORMATIONAL — this service already ships in
      # docker-compose.apps.yml (with its config-init companion and
      # named config volume); you do NOT paste this anywhere. Run the
      # command below and compose brings it up from the shipped overlay.
      # Set HA_MQTT_HOST (or HA_URL + HA_TOKEN for the rest backend)
      # in your .env so the relay can reach your Home Assistant.
      services:
        home-assistant-relay:
          profiles: [apps]
          image: ${HOME_ASSISTANT_RELAY_IMAGE:-opennvr/home-assistant-relay:local-build}
          restart: unless-stopped
          environment:
            - OPENNVR_INTERNAL_API_KEY=${INTERNAL_API_KEY}
            - NATS_URL=nats://nats:4222
            - OPENNVR_URL=http://opennvr-core:8000
          expose:
            - "9209"
          networks:
            - opennvr_internal
    command: docker compose -f docker-compose.yml -f docker-compose.apps.yml --profile apps up -d home-assistant-relay
