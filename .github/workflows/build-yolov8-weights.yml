#
# Build + publish workflow for the ghcr.io/open-nvr/yolov8-weights
# image (ISSUE-7 v2).
#
# Why this exists: the default Tier 0 yolov8-weights-init container
# does apt-get install + pip install + ultralytics export at first
# boot. Operators on ISP/firewall-filtered networks (reported from
# IN/CN/IR) can't reach deb.debian.org / pypi.org / ultralytics.com,
# so they need a pre-built image that just `cp`s a known-good ONNX
# into the weights volume. This workflow builds that image.
#
# The image is ~20 MB (alpine:3.20 base + yolov8n.onnx). Multi-stage
# build pulls ultralytics/ultralytics:8.3.40 to do the export, then
# discards everything but the ONNX. Same Ultralytics tag the default
# Tier 0 init container pins to, so adapter conformance kit results
# are identical.
#
# Triggered on:
#   - Pull request touching examples/yolov8-weights/* or this file →
#     build only (no push). Catches broken Dockerfile early.
#   - Push to main → build + push :main and :sha-<short>.
#   - Tag matching v* → build + push :v<ultralytics-tag>, :latest.
#
# Architecture: linux/amd64 + linux/arm64. The ONNX file is the same
# on both architectures (it's a model graph, not native code), so
# multi-arch manifest comes for free at no extra build cost.

name: build-yolov8-weights

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "examples/yolov8-weights/**"
      - ".github/workflows/build-yolov8-weights.yml"
  pull_request:
    paths:
      - "examples/yolov8-weights/**"
      - ".github/workflows/build-yolov8-weights.yml"
  # Manual trigger so we can re-publish after an Ultralytics
  # security release without bumping OpenNVR's own version.
  workflow_dispatch:
    inputs:
      ultralytics_tag:
        description: "Ultralytics version to pin (e.g. 8.3.40)"
        required: false
        default: "8.3.40"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip the login on pull_request — we don't push on PRs and
        # GHCR rejects logins from forked-PR contexts anyway.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          # The Ultralytics tag drives the image tag because that's
          # the operator-meaningful version (which YOLOv8 release).
          # OpenNVR's own version doesn't change the bytes inside.
          ULTRALYTICS_TAG="${{ github.event.inputs.ultralytics_tag || '8.3.40' }}"
          # On a tagged OpenNVR release, also publish :latest.
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            EXTRA="ghcr.io/${{ github.repository_owner }}/yolov8-weights:latest"
          else
            EXTRA=""
          fi
          # Always publish the Ultralytics-tag variant.
          PRIMARY="ghcr.io/${{ github.repository_owner }}/yolov8-weights:v${ULTRALYTICS_TAG}"
          SHA="ghcr.io/${{ github.repository_owner }}/yolov8-weights:sha-${GITHUB_SHA::8}"
          {
            echo "primary=${PRIMARY}"
            echo "extra=${EXTRA}"
            echo "sha=${SHA}"
            echo "ultralytics_tag=${ULTRALYTICS_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Build (and push if not PR)
        uses: docker/build-push-action@v5
        with:
          context: examples/yolov8-weights
          file: examples/yolov8-weights/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          # Multi-tag push so operators can pin by Ultralytics tag or
          # use :latest. SHA tag is for the "I want exactly this
          # build" auditing case.
          tags: |
            ${{ steps.tags.outputs.primary }}
            ${{ steps.tags.outputs.sha }}
            ${{ steps.tags.outputs.extra }}
          # Reproducibility: pass the same ULTRALYTICS_PT tag the
          # default Tier 0 init container uses, so the resulting
          # .onnx is byte-identical to what the export path produces.
          build-args: |
            YOLOV8_PT_URL=https://github.com/ultralytics/assets/releases/download/v8.3.0/yolov8n.pt
          # BuildKit caching — Ultralytics base image is ~3 GB and
          # rarely changes between OpenNVR releases. GHA's cache
          # backend makes the second build ~30 sec instead of ~5 min.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sanity-check the published image
        # Only after a real push — pull the image we just published
        # and verify the .onnx is actually inside. Cheap insurance
        # against "the build succeeded but the COPY didn't" silent
        # failures.
        if: github.event_name != 'pull_request'
        run: |
          docker pull "${{ steps.tags.outputs.primary }}"
          # Extract the .onnx and check its size + magic bytes.
          docker run --rm --entrypoint sh "${{ steps.tags.outputs.primary }}" \
              -c 'wc -c < /yolov8n.onnx && head -c 4 /yolov8n.onnx | xxd | head -1'
          # ONNX files start with `\x08\x07` (protobuf varint for
          # ir_version field). If the file is empty or HTML (404
          # page), this dump will look obviously wrong.
