#
# Build + publish workflow for the opennvr-core container image.
#
# Tier 0 install (docker-compose.tier0.yml) pulls this image straight
# from GHCR instead of building from source — a fresh install on a
# normal home machine drops from ~5 minutes (frontend build + Python
# deps + native libs) to ~30 seconds (pull + start). Combined with
# the pre-built adapter images in the ai-adapter repo, the full Tier
# 0 demo is under 5 minutes wall time on a typical broadband link.
#
# Triggered on:
#   - Pull request touching the Dockerfile, server/, kai-c/, app/,
#     or this workflow file → build only, no push. Catches a broken
#     Dockerfile or missing-file issue before merge.
#   - Push to main          → build + push :main and :sha-<short>.
#     Tier 0 compose can pin :main for the bleeding-edge install path.
#   - Tag matching ``v*``    → build + push :<version>, :latest,
#     :sha-<short>. The release path.
#
# Architecture: linux/amd64 only for v0.1. The opennvr-core image
# Python deps include opencv + psycopg which have arm64 wheels, so
# arm64 is a fast-follow once we've validated the Pi 5 path end-to-
# end. Documented in the Tier 0 README.

name: publish-images

on:
  # No ``paths`` filter on push — GitHub applies push path filters to
  # both branches AND tags, which means a release tag pointing at a
  # commit that doesn't touch the listed paths would silently skip
  # publishing. Build-on-every-main-push is cheap (BuildKit cache,
  # core changes rarely) and the alternative landmine is not worth it.
  push:
    # Every branch auto-builds + pushes an image tagged with the branch
    # name (type=ref,event=branch → ghcr.io/open-nvr/core:<branch>) plus
    # :sha-<short>, so a feature branch's changes get a pullable image
    # without manually dispatching the workflow. The :latest and :main
    # tags stay gated below to the default branch / release tags, so
    # feature builds never clobber the release tags.
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    paths:
      - "Dockerfile"
      - "server/**"
      - "kai-c/**"
      - "app/**"
      - "docker-entrypoint.sh"
      - "supervisord.conf"
      - ".github/workflows/publish-images.yml"
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-and-push:
    name: opennvr-core
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/open-nvr/core
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # :latest tracks the most recent build on the default branch
            # (main) AND any subsequent release tag. Tier 0 compose pins
            # :latest, so operators trying the project before the first
            # ``v*`` tag still get a working image. Once we cross v1.0
            # the policy may tighten to "release tags only" — for v0.1
            # we keep this loose because the Tier 0 promise depends on
            # :latest existing the moment the project is announced.
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=OpenNVR Core
            org.opencontainers.image.description=OpenNVR backend + frontend + KAI-C connector. Tier 0 install ships this as a single container.
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.vendor=OpenNVR
            org.opencontainers.image.documentation=https://github.com/open-nvr/open-nvr/blob/main/README.md

      - name: Build${{ github.event_name != 'pull_request' && ' + push' || ' (no push)' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ github.event_name == 'pull_request' && 'ghcr.io/open-nvr/core:local-smoke' || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache keeps the frontend + Python dep layers warm
          # across runs. mode=max caches all stages including the
          # heavy ``uv sync`` layer.
          cache-from: type=gha,scope=opennvr-core
          cache-to: type=gha,scope=opennvr-core,mode=max

      # On PR we verify the image at least boots far enough to start
      # listening. We can't run the full stack here (no mediamtx, no
      # adapter), so we plug in stubs and check that the supervisord
      # process tree comes up and /health becomes reachable. The
      # point is to catch boot-time ImportError / missing-file
      # regressions, not full E2E.
      - name: Smoke-test the built image (PR only)
        if: github.event_name == 'pull_request'
        env:
          IMAGE: ghcr.io/open-nvr/core:local-smoke
        run: |
          set -euo pipefail

          # One cleanup function for everything we spin up — each
          # ``trap "X" EXIT`` call REPLACES the previous trap rather
          # than appending, so chained traps silently drop the earlier
          # cleanups. Defining one function and trapping it once is
          # the only correct pattern.
          cleanup() {
            docker logs smoke-core 2>&1 | tail -200 >&2 || true
            docker rm -f smoke-core smoke-db >/dev/null 2>&1 || true
            docker network rm opennvr-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker network create opennvr-smoke

          # Throwaway postgres so the core process clears its startup
          # DB probe. /health itself doesn't touch the DB, but it IS
          # served from inside the lifespan handler that runs
          # init_db() (alembic + create_initial_data). A blocked /
          # slow migration delays /health implicitly — hence the
          # generous health-wait budget below.
          docker run -d --name smoke-db --network opennvr-smoke \
            -e POSTGRES_USER=opennvr \
            -e POSTGRES_PASSWORD=smoke-pass \
            -e POSTGRES_DB=opennvr \
            postgres:15-alpine
          db_ready=0
          for i in $(seq 1 30); do
            if docker exec smoke-db pg_isready -U opennvr >/dev/null 2>&1; then
              db_ready=1
              break
            fi
            sleep 2
          done
          if [ "$db_ready" != "1" ]; then
            echo "::error::postgres did not become ready in 60s — aborting smoke." >&2
            docker logs smoke-db 2>&1 | tail -100 >&2 || true
            exit 1
          fi

          # Generate cryptographically random secrets that satisfy the
          # strong-secret validator (rejects placeholder-pattern
          # strings) AND the Fernet-key validator
          # (CREDENTIAL_ENCRYPTION_KEY must be a valid 32-byte
          # url-safe-base64 key — Fernet's strict format).
          #
          # All four use openssl rather than python3 + cryptography.
          # openssl is part of the base runner image; cryptography is
          # currently pre-installed on ubuntu-latest but that's a
          # transitive guarantee a future runner refresh could remove,
          # and we'd rather not eat a CI break for that. The
          # ``openssl rand -base64 32 | tr '+/' '-_'`` form produces
          # the url-safe-base64 of 32 random bytes — exactly the
          # 44-char shape Fernet expects (verified end-to-end against
          # cryptography.Fernet's own decoder).
          SMOKE_SECRET_KEY=$(openssl rand -hex 32)
          SMOKE_INTERNAL_API_KEY=$(openssl rand -hex 32)
          SMOKE_MEDIAMTX_SECRET=$(openssl rand -hex 32)
          SMOKE_FERNET_KEY=$(openssl rand -base64 32 | tr '+/' '-_')

          # Env vars supervisord.conf needs at parse time:
          #   * ADAPTER_URL — kai-c program block expands this via
          #     %(ENV_ADAPTER_URL)s. Supervisord refuses to load the
          #     config file if any %(ENV_*)s reference points at an
          #     undefined var, regardless of whether that program
          #     ever runs. We pass a placeholder URL — kai-c will
          #     fail to reach the adapter behind it, but /health on
          #     the core doesn't depend on kai-c being healthy.
          #   * INTERNAL_API_KEY — same mechanism, already set below.
          #
          # DEPLOYMENT_MODE valid values are offline / hybrid / cloud
          # (server/core/config.py — Literal type). "offline" is the
          # default and the right value for a CI smoke test where
          # cloud connectivity isn't relevant.
          docker run -d --name smoke-core --network opennvr-smoke \
            -e DATABASE_URL=postgresql://opennvr:smoke-pass@smoke-db:5432/opennvr \
            -e SECRET_KEY="$SMOKE_SECRET_KEY" \
            -e CREDENTIAL_ENCRYPTION_KEY="$SMOKE_FERNET_KEY" \
            -e INTERNAL_API_KEY="$SMOKE_INTERNAL_API_KEY" \
            -e MEDIAMTX_SECRET="$SMOKE_MEDIAMTX_SECRET" \
            -e DEPLOYMENT_MODE=offline \
            -e ADAPTER_URL=http://localhost:9100 \
            -p 127.0.0.1:8000:8000 \
            "$IMAGE"

          # Cold-start budget: docker image cold-start (~5-15s) +
          # alembic walking every revision against an empty DB
          # (10-30s on a slow runner) + create_initial_data seeding
          # roles / permissions / admin (DB writes) + uvicorn binding.
          # Realistic total is 30-90s but the long-tail is what
          # produces flakes — 90 iterations × 2s = 180s is generous
          # enough to absorb a cold-cache GitHub runner.
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:8000/health >/dev/null; then
              echo "opennvr-core healthy after ${i}x2s."
              exit 0
            fi
            sleep 2
          done
          echo "::error::opennvr-core never reached /health within 3 minutes." >&2
          exit 1
