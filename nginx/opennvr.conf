# ============================================================
# OpenNVR — nginx TLS reverse proxy (ISSUE-6)
# ============================================================
# Terminates self-signed TLS on the host's public NIC and proxies
# everything to opennvr-core:8000 over the Docker internal bridge.
# The bridge hop is inside V-015's trust zone (RFC1918), so cleartext
# HTTP on that segment is acceptable — TLS protects the LAN hop, which
# is where ISSUE-6 exposed the gap.
#
# Scope (this iteration): UI + API only. MediaMTX HLS/WebRTC streams
# still come from MediaMTX directly and are tracked under the ISSUE-6
# follow-up (task #11). Live-view will be broken on LAN clients until
# that lands because browsers refuse HTTPS → HTTP mixed content.

# WebSocket connection upgrade — derived from $http_upgrade so the
# Connection header is sent only when the client is upgrading.
# Declared up here at the http-context level so both servers can
# reference it; nginx's conf.d/*.conf files are include-d inside an
# implicit http {} block.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 80 → 443 redirect. Operators who hit http://server-ip get bounced
# to https. We don't try to serve HTTP at all so misconfigured clients
# fail loudly rather than silently downgrading.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    # HSTS only on the HTTPS server; on the redirect we just bounce.
    return 301 https://$host$request_uri;
}

# HTTPS terminator.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Camera-snapshot uploads and recording-export endpoints can
    # carry multi-MB bodies. 256M leaves headroom for a few minutes
    # of HD H.264 segment without truncating.
    client_max_body_size 256M;

    # nginx-internal healthcheck endpoint — used by the container's
    # docker healthcheck. Returns 200 without touching opennvr-core
    # so the proxy reports healthy even during a backend restart.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── Media plane (ISSUE-6 v8) ────────────────────────────────
    # Three sibling locations that proxy directly to MediaMTX over
    # the Docker bridge. The browser sees same-origin HTTPS URLs
    # like https://<host>/webrtc/cam-1/whep and never has to talk
    # to MediaMTX directly. The bridge hop (nginx → mediamtx) is
    # plaintext but inside V-015's trust zone (RFC1918), which is
    # the same security profile as nginx → opennvr-core.

    # WebRTC signalling (WHEP). Small POST with SDP offer/answer.
    # The actual media stream is DTLS-SRTP over UDP/8189 — that
    # path goes browser ↔ mediamtx UDP directly, NOT through nginx.
    # mediamtx must advertise the right ICE candidates via
    # webrtcAdditionalHosts (set via MTX_WEBRTCADDITIONALHOSTS in
    # the compose).
    #
    # NOTE: mediamtx serves HTTPS on :8889 (V-019: webrtcEncryption=yes
    # in mediamtx.docker.yml). We connect to it as an HTTPS upstream
    # and disable cert verification because mediamtx's cert is
    # self-signed and lives inside the Docker bridge (V-015 trust
    # zone — same posture as nginx → opennvr-core HTTP). The bridge
    # is namespace-isolated; an attacker would need code execution
    # inside the bridge to forge a cert, which is a higher bar than
    # this verification protects against.
    location /webrtc/ {
        proxy_pass https://mediamtx:8889/;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # SDP exchange is small; no special buffering needed.
    }

    # HLS live + recordings — segment-based, HTTPS GETs.
    # Works everywhere WebRTC doesn't (strict firewalls, no UDP
    # outbound, etc.). The React UI tries WebRTC first and falls
    # back to HLS automatically.
    # mediamtx serves HTTPS here too (hlsEncryption=yes); same
    # self-signed-trust-by-design rationale as /webrtc/.
    location /hls/ {
        proxy_pass https://mediamtx:8888/;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # HLS segments are ~5s chunks; let nginx buffer them.
        proxy_buffering on;
    }

    # The bare /playback/ is the SPA page route, not a MediaMTX request
    # (MediaMTX playback uses /playback/get). Redirect the exact trailing-slash
    # URL to the canonical slashless route so a browser refresh loads the UI
    # instead of hitting the media proxy and 404ing. Exact match (=) wins over
    # the /playback/ prefix below.
    location = /playback/ { return 302 /playback; }

    # Recording playback — MediaMTX's playback server (default :9996) serves
    # /get and HLS-shaped recording segments; opennvr-core emits browser URLs
    # against this proxy path. Plaintext on the bridge; nginx is the TLS edge.
    location /playback/ {
        proxy_pass http://mediamtx:9996/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering on;
        # Recording segments can be a few MB; allow a generous read
        # timeout for slow client connections (mobile on cellular).
        proxy_read_timeout 300;
    }

    # Everything else proxies to opennvr-core.
    location / {
        proxy_pass http://opennvr-core:8000;
        proxy_http_version 1.1;

        # Standard reverse-proxy headers.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket upgrade — the inference-event stream, the audit
        # live-tail, and any future SSE/WS endpoint will need this.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # Server-Sent Events: don't buffer or chunk the response, or
        # the browser sees event batches instead of a live stream.
        proxy_buffering   off;
        proxy_cache       off;
        proxy_read_timeout 86400;  # 24h — SSE connections are long-lived
        proxy_send_timeout 86400;

        # The opennvr-core healthcheck handle, exposed for parity
        # with the existing /health endpoint.
    }
}
