# ==========================================
# OpenNVR — Tier 0 Quickstart Compose
# ==========================================
#
# The fastest, most opinionated install path: NVR core + one AI
# adapter (YOLOv8 for object detection). Everything pulls from
# pre-built images — no source builds, no toolchain, no manual
# weights download. Target wall time on a normal broadband link
# (50 Mbps, fresh Docker): under 5 minutes on x86.
#
# On edge hardware (Raspberry Pi 5), the YOLOv8 ONNX export adds
# 10–15 min to *first* boot only — see `yolov8-weights-init` below
# for why. Subsequent boots are instant (ONNX cached on the
# opennvr_yolov8_weights volume). The v0.1.1 GHCR weights image
# will eliminate this for the default case.
#
# Quickstart:
#     cp .env.example .env
#     ./scripts/generate-secrets.sh --write
#     docker compose -f docker-compose.tier0.yml up -d
#
# Open http://localhost:8000 and follow the one-time setup flow.
#
# To layer the camera-agent voice example on top:
#     docker compose \
#         -f docker-compose.tier0.yml \
#         -f docker-compose.camera-agent.yml \
#         --profile camera-agent up -d
#
# To enable additional adapters (Piper TTS, Whisper STT, fast-plate-
# ocr LPR, InsightFace facial recognition, BLIP captions), see
# docs/TIER0_ENABLING_ADAPTERS.md. Each is a single image addition
# and a one-line KAI-C registry entry; the camera-agent overlay is
# a worked example of the same pattern.
#
# What this file is NOT: a production deployment. For production
# you'll want host-mode networking (see docker-compose.linux.yml),
# external TLS termination, a managed Postgres, and reverse-proxy
# auth. Tier 0 is the demo + dev surface — it gets you to "boxes
# on your camera feed" in five minutes so you can decide whether
# the rest of the project is worth your evening.
# ==========================================

services:
  # ──────────────────────────────────────────────────────────────
  # PostgreSQL — persistence for cameras, alerts, audit logs.
  # ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: opennvr_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - opennvr_db_data:/var/lib/postgresql/data
    networks:
      - opennvr_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # MediaMTX cert init — one-shot self-signed cert generator.
  # See docker-compose.yml for the long-form rationale; same shape
  # here so behaviour is identical across install paths.
  # ──────────────────────────────────────────────────────────────
  mediamtx-certs-init:
    image: alpine:3.20
    container_name: opennvr_mediamtx_certs_init
    command:
      - sh
      - -c
      - |
        set -e
        if [ -f /certs/server.crt ] && [ -f /certs/server.key ]; then
          echo "MediaMTX certs already present; skipping."
          exit 0
        fi
        apk add --no-cache openssl >/dev/null
        umask 077
        openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
          -keyout /certs/server.key -out /certs/server.crt \
          -subj "/CN=opennvr-mediamtx" \
          -addext "subjectAltName=DNS:localhost,DNS:mediamtx,IP:127.0.0.1,IP:::1" \
          -addext "basicConstraints=critical,CA:FALSE" \
          -addext "keyUsage=critical,digitalSignature,keyEncipherment" \
          -addext "extendedKeyUsage=serverAuth"
        chmod 0644 /certs/server.crt
        echo "Wrote /certs/server.{crt,key}."
    volumes:
      - ./mediamtx-certs:/certs

  # ──────────────────────────────────────────────────────────────
  # MediaMTX — RTSP / HLS / WebRTC streaming server.
  # We keep the inline multi-stage build here even in Tier 0
  # because it's just a 15-second binary-copy from the official
  # MediaMTX image plus ``apk add curl`` for runOnInit webhooks.
  # Publishing it as a separate GHCR image isn't worth the moving
  # parts for that small a build.
  # ──────────────────────────────────────────────────────────────
  mediamtx:
    build:
      context: .
      dockerfile_inline: |
        FROM bluenviron/mediamtx:1.15.4 AS base
        FROM alpine:3.20
        RUN apk add --no-cache curl
        COPY --from=base /mediamtx /mediamtx
        ENTRYPOINT ["/mediamtx"]
    container_name: opennvr_mediamtx
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mediamtx-certs-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8322:8322" # RTSPS (TLS-required RTSP)
      - "127.0.0.1:8888:8888" # HLS (HTTPS)
      - "127.0.0.1:8889:8889" # WebRTC signaling (HTTPS)
      - "127.0.0.1:8189:8189/tcp" # WebRTC ICE
      - "127.0.0.1:8189:8189/udp" # WebRTC ICE
      - "127.0.0.1:9997:9997" # API/metrics
      - "127.0.0.1:9996:9996" # Playback API
    volumes:
      - ./mediamtx.docker.yml:/mediamtx.yml:ro
      - ./mediamtx-certs:/etc/mediamtx-certs:ro
      - ${RECORDINGS_PATH:-./recordings}:/app/recordings
    environment:
      - MEDIAMTX_SECRET=${MEDIAMTX_SECRET}
      - BACKEND_HOST=${BACKEND_HOST:-opennvr_core}
      - MTX_AUTHJWTJWKS=http://opennvr_core:8000/.well-known/jwks.json
      - BACKEND_PORT=${BACKEND_PORT:-8000}
    networks:
      - opennvr_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9997/v3/paths/list"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # ──────────────────────────────────────────────────────────────
  # NATS event bus — KAI-C publishes inference events here so
  # downstream apps (alert relays, custom dashboards) can subscribe.
  # ──────────────────────────────────────────────────────────────
  nats:
    image: nats:2-alpine
    container_name: opennvr_nats
    restart: unless-stopped
    command:
      - --name
      - opennvr-nats
      - --auth
      - ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env for the NATS event bus}
      - --http_port
      - "8222"
    networks:
      - opennvr_internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ──────────────────────────────────────────────────────────────
  # YOLOv8 weights init — one-shot downloader for the ONNX
  # weights the YOLOv8 adapter expects at /weights/yolov8n.onnx.
  #
  # We can't bake the weights into the adapter image because the
  # build pipeline ships a generic, vendor-neutral adapter; the
  # specific model weight choice (yolov8n vs yolov8s vs a
  # fine-tuned in-house model) lives with the operator. The init
  # container makes the "no manual download" promise true for the
  # default (yolov8n) case while leaving the override path open
  # via the YOLOV8_WEIGHTS_URL env var.
  # ──────────────────────────────────────────────────────────────
  yolov8-weights-init:
    # Python image because Ultralytics no longer publishes a pre-built
    # yolov8n.onnx anywhere reachable (HF Ultralytics/YOLOv8 is gated
    # behind an allowlist; github.com/ultralytics/assets/releases/.../
    # yolov8n.onnx returns 404). The PyTorch checkpoint (.pt) on the
    # same release tag is stable, so we download that and export to
    # ONNX with the ultralytics CLI at first boot. Cached on the
    # opennvr_yolov8_weights volume, so this runs once per host.
    image: python:3.11-slim
    container_name: opennvr_yolov8_weights_init
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -e
        WEIGHTS=/weights/yolov8n.onnx
        if [ -s "$$WEIGHTS" ]; then
          echo "yolov8n.onnx already present at $$WEIGHTS (size: $$(wc -c < $$WEIGHTS) bytes); skipping."
          exit 0
        fi

        # curl + ca-certificates are needed by both branches below, so
        # install once. The cached-skip path above already exited, so
        # this only runs on a genuinely fresh /weights volume.
        apt-get update -qq >/dev/null
        apt-get install -y -qq --no-install-recommends curl ca-certificates >/dev/null

        # Override path — an operator supplies a pre-built ONNX via
        # YOLOV8_WEIGHTS_URL (fine-tuned model, private mirror, etc.).
        # If set, we curl it directly and skip the .pt → ONNX export.
        if [ -n "$${YOLOV8_WEIGHTS_URL}" ]; then
          echo "YOLOV8_WEIGHTS_URL set; fetching pre-built ONNX from $${YOLOV8_WEIGHTS_URL}..."
          curl --fail --location --retry 5 --retry-all-errors --retry-delay 3 \
            --output "$$WEIGHTS" \
            "$${YOLOV8_WEIGHTS_URL}"
          echo "Downloaded $$(wc -c < $$WEIGHTS) bytes to $$WEIGHTS."
          exit 0
        fi

        # Default path: download yolov8n.pt and export to ONNX.
        # ultralytics pulls torch + torchvision (~700 MB transient
        # install in the init container's filesystem — not cached on
        # the host). After the export, the ONNX itself lives on the
        # /weights volume, so subsequent boots short-circuit at the
        # top and don't run any of this. The pip install only repeats
        # if an operator deletes the weights volume.
        # Export takes 1–3 min on x86, 10–15 min on a Pi 5.
        echo "Fetching yolov8n.pt from $${YOLOV8_PT_URL}..."
        TMPDIR=$$(mktemp -d)
        curl --fail --location --retry 5 --retry-all-errors --retry-delay 3 \
          --output "$$TMPDIR/yolov8n.pt" \
          "$${YOLOV8_PT_URL}"
        echo "Installing ultralytics (one-time, ~700 MB)..."
        pip install --quiet --no-cache-dir "ultralytics==8.3.40" "onnx>=1.16,<2"
        # simplify=False is deliberate: matches the byte layout the
        # adapter image was conformance-tested against. Do not flip
        # without re-running the adapter conformance kit
        # (docs/AI_ADAPTER_CONTRACT.md §11.4) — the simplifier folds
        # constants and changes node naming, which can shift the
        # adapter's model fingerprint and the audit-chain sha256.
        echo "Exporting to ONNX (opset=12, imgsz=640) — this may take a few minutes on edge hardware..."
        cd "$$TMPDIR"
        yolo export model=yolov8n.pt format=onnx opset=12 imgsz=640 simplify=False
        mv yolov8n.onnx "$$WEIGHTS"
        rm -rf "$$TMPDIR"
        echo "Exported $$(wc -c < $$WEIGHTS) bytes to $$WEIGHTS."
    environment:
      # Override to supply a pre-built ONNX (fine-tuned model or a
      # private mirror); when set, we skip the .pt → ONNX export and
      # curl this URL directly. Unset by default because the upstream
      # Ultralytics ONNX URLs (HF + github assets) were both retired,
      # so the safe default is to derive the ONNX from the .pt.
      - YOLOV8_WEIGHTS_URL=${YOLOV8_WEIGHTS_URL:-}
      # Stable upstream .pt URL. Pinned to v8.3.0 so the boot is
      # reproducible across hosts and the ONNX export is deterministic.
      - YOLOV8_PT_URL=${YOLOV8_PT_URL:-https://github.com/ultralytics/assets/releases/download/v8.3.0/yolov8n.pt}
    volumes:
      - opennvr_yolov8_weights:/weights

  # ──────────────────────────────────────────────────────────────
  # YOLOv8 adapter — object detection (boxes + class labels).
  # The Tier 0 default. Comment out the entire block if you want
  # a no-AI install (NVR + recording + viewing only).
  # ──────────────────────────────────────────────────────────────
  yolov8-adapter:
    image: ghcr.io/open-nvr/yolov8-adapter:${ADAPTER_TAG:-latest}
    container_name: opennvr_yolov8_adapter
    restart: unless-stopped
    depends_on:
      yolov8-weights-init:
        condition: service_completed_successfully
    environment:
      - OPENNVR_ADAPTER_TOKEN=${INTERNAL_API_KEY}
      - YOLOV8_WEIGHTS_DIR=/weights
    volumes:
      - opennvr_yolov8_weights:/weights:ro
    networks:
      - opennvr_internal
    # No port mapping — the adapter is internal-only, reached by
    # KAI-C over the opennvr_internal network. Operators wanting
    # to hit /infer directly from outside the compose can add a
    # ``127.0.0.1:9002:9002`` port mapping.
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx, sys; sys.exit(0 if httpx.get('http://127.0.0.1:9002/health', timeout=2).status_code == 200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # OpenNVR core — backend + frontend + KAI-C.
  # ──────────────────────────────────────────────────────────────
  opennvr-core:
    image: ghcr.io/open-nvr/core:${CORE_TAG:-latest}
    container_name: opennvr_core
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mediamtx:
        condition: service_healthy
      nats:
        condition: service_healthy
      yolov8-adapter:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - shared_frames:/app/AI-adapters/AIAdapters/frames
      - ${RECORDINGS_PATH:-./recordings}:/app/recordings
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - MEDIAMTX_BASE_URL=http://mediamtx:8889
      - MEDIAMTX_ADMIN_API=http://mediamtx:9997/v3
      - MEDIAMTX_HLS_URL=http://mediamtx:8888
      - MEDIAMTX_RTSP_URL=rtsp://mediamtx:8554
      - MEDIAMTX_RTSPS_URL=rtsps://mediamtx:8322
      - MEDIAMTX_EXTERNAL_RTSPS_URL=rtsps://localhost:8322
      - MEDIAMTX_PLAYBACK_URL=http://mediamtx:9996
      - MEDIAMTX_EXTERNAL_BASE_URL=http://127.0.0.1:8889
      - MEDIAMTX_EXTERNAL_HLS_URL=http://127.0.0.1:8888
      - MEDIAMTX_EXTERNAL_PLAYBACK_URL=http://127.0.0.1:9996
      - KAI_C_URL=http://127.0.0.1:8100
      - RECORDINGS_HOST_BASE=${RECORDINGS_PATH:-./recordings}
      - RECORDINGS_CONTAINER_BASE=/app/recordings
      - RECORDINGS_BASE_PATH=/app/recordings
      - SECRET_KEY=${SECRET_KEY}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - MEDIAMTX_SECRET=${MEDIAMTX_SECRET}
      # KAI-C points at the yolov8 adapter as "default" — the
      # camera-agent overlay extends this with explicit per-model
      # routes (whisper, piper, ollama). Operators enabling more
      # adapters can extend ADAPTER_URL similarly OR set up a
      # multi-URL ADAPTER_REGISTRY override in a follow-up release.
      - ADAPTER_URL=http://yolov8-adapter:9002
      # Inference frame-capture reads from MediaMTX's plaintext
      # loopback path (rtsp://mediamtx:8554/cam-N) rather than
      # opening a second RTSP session directly to the camera. This
      # eliminates the double-pull most consumer cameras can't
      # tolerate and saves the per-frame TLS overhead on a hop that
      # never leaves the host's kernel. Flip to "false" only if
      # you're running MediaMTX and KAI-C on different hosts; see
      # docs/SECURITY_ARCHITECTURE.md §"RTSP encryption posture".
      - INFERENCE_USE_MEDIAMTX_TAP=${INFERENCE_USE_MEDIAMTX_TAP:-true}
      - MEDIAMTX_STREAM_PREFIX=${MEDIAMTX_STREAM_PREFIX:-cam-}
      - NATS_URL=nats://nats:4222
      - FRAMES_DIR=/app/AI-adapters/AIAdapters/frames
      - HOST=${HOST:-0.0.0.0}
      - DEBUG=${DEBUG:-False}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - opennvr_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

# ==========================================
# Networks
# ==========================================
networks:
  opennvr_internal:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  opennvr_db_data:
  shared_frames:
  # yolov8 model weights — persistent so the init container only
  # runs once. Wipe with ``docker volume rm openvr_opennvr_yolov8_weights``
  # to force a re-download (e.g., after the weights URL changes).
  opennvr_yolov8_weights:
