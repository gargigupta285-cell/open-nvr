# __APP_NAME__ — config template.
#
# Copy this file to ``config.yml``, fill in the values for your
# deployment, and run:
#
#   python __APP_MODULE__.py --config config.yml

# ── NATS endpoint (KAI-C's event bus) ──────────────────────────────
#
# This app subscribes to KAI-C's inference broadcast surface instead of
# driving its own inference. It rides the stream another app (e.g.
# intrusion-detection) is already pushing — one adapter inference fans
# out to N consumers; this app pays zero GPU cost on top.
nats_url: "nats://nats:4222"
# Bare-metal / host-mode deployment:
# nats_url: "nats://127.0.0.1:4222"

# Token-auth secret. Must match the INTERNAL_API_KEY the stack's NATS
# uses. Leave null only in fully-isolated dev deployments where NATS is
# configured auth-less.
nats_token: null

# Subject pattern. The wildcard ``opennvr.inference.>`` catches every
# adapter's events; narrow to e.g. ``opennvr.inference.yolov8.>`` to
# only see one adapter's results.
subject_pattern: "opennvr.inference.>"

# ── Detection filter ──────────────────────────────────────────────
#
# Only detections with one of these labels (case-folded) count toward
# the rule. Edit for your app's domain.
watch_labels:
  - "person"

# ── Webhook (optional) ────────────────────────────────────────────
#
# Alerts always go to stdout. If you set ``webhook_url``, they're also
# POSTed as JSON to that URL — Slack, Discord, Teams, PagerDuty, etc.
webhook_url: null

# ── NATS alert fan-out (optional) ─────────────────────────────────
#
# When set, every fired alert is also published as JSON to
#   opennvr.alerts.app.__APP_ID__.{camera_id}
# so the operator-UI alerts inbox or any other subscriber can pick it
# up off the bus instead of needing a per-app webhook.
nats_alerts_url: null
nats_alerts_token: null

# ── App contract (spec §03) — powers the App Catalog ───────────────
#
# Uncomment to serve /health /manifest /state on contract_port and
# self-register with the OpenNVR app registry on boot (so the app shows
# up in Settings → App Catalog with a live status dot).
# contract_port: 9210
# contract_bind_host: "0.0.0.0"
# contract_host: "__APP_ID__"
# opennvr_url: "http://opennvr-core:8000"
