# ==========================================
# OpenNVR — camera-agent overlay
# ==========================================
#
# The camera-agent in two ways to run, same app:
#
#   * camera-agent        VOICE — ask out loud, hear the answer spoken back.
#                         Pipecat + Silero VAD + Whisper STT + Ollama LLM +
#                         Piper TTS + YOLOv8/BLIP vision. The flagship.
#   * camera-agent-chat   CHAT — type your question, read the answer. Same
#                         tools and scene description (YOLOv8 + BLIP), no
#                         microphone/speaker, so it's lighter (no Whisper/Piper).
#
# Both run a small local LLM by default. To use a cloud / bring-your-own brain
# instead (OpenAI-compatible), see examples/camera-agent/config.cloud.yml.
#
# Quickstart (from the repo root):
#
#     examples/camera-agent/quickstart.sh          # voice (default)
#     examples/camera-agent/quickstart.sh --chat   # text chat
#     examples/camera-agent/quickstart.sh --down   # stop
#
# Or drive Compose directly:
#
#     docker compose -f docker-compose.tier0.yml \
#                    -f docker-compose.camera-agent.yml \
#                    --profile camera-agent up -d      # or --profile camera-agent-chat
#
# The Ollama model is pulled automatically on first ``up``. Open
# http://localhost:9100/demo.
#
# ── A note on packaging maturity ───────────────────────────────
#
# v0.1 ships the camera-agent service ``build:``-from-source. The speech and
# vision adapters are already published as per-adapter GHCR images, matching
# Tier 0's pull-first posture. The LLM path talks directly to the local Ollama
# service until a dedicated ghcr.io/open-nvr/ollama-adapter image is published.
# ==========================================

services:
  # ──────────────────────────────────────────────────────────────
  # Whisper STT — VOICE only. Pulled from GHCR. The image eagerly loads the
  # selected model on boot; first run may download faster-whisper weights into
  # the persisted cache, then later boots reuse them.
  # ──────────────────────────────────────────────────────────────
  whisper-adapter:
    profiles: [camera-agent]
    image: ghcr.io/open-nvr/whisper-adapter:${ADAPTER_TAG:-latest}
    container_name: opennvr_whisper_adapter
    restart: unless-stopped
    environment:
      - OPENNVR_ADAPTER_TOKEN=${INTERNAL_API_KEY}
      # English-only Whisper: faster on CPU and avoids the multilingual
      # model hallucinating foreign-language tokens on noisy/quiet audio.
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base.en}
    volumes:
      - opennvr_whisper_models:/app/model_weights/whisper
    networks:
      - opennvr_internal
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx, sys; sys.exit(0 if httpx.get('http://127.0.0.1:9003/health', timeout=2).status_code == 200 else 1)"]
      interval: 15s
      timeout: 5s
      start_period: 300s
      retries: 20

  # ──────────────────────────────────────────────────────────────
  # Piper TTS — VOICE only. Pulled from GHCR. The default voice files live in
  # the sibling ai-adapter checkout and are mounted where the current
  # PiperService resolves MODEL_WEIGHTS_DIR/piper.
  # ──────────────────────────────────────────────────────────────
  piper-adapter:
    profiles: [camera-agent]
    image: ghcr.io/open-nvr/piper-adapter:${ADAPTER_TAG:-latest}
    container_name: opennvr_piper_adapter
    restart: unless-stopped
    environment:
      - OPENNVR_ADAPTER_TOKEN=${INTERNAL_API_KEY}
    volumes:
      - ../ai-adapter/model_weights/piper:/app/model_weights/piper:ro
      - opennvr_piper_audio:/app/audio
    networks:
      - opennvr_internal
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx, sys; sys.exit(0 if httpx.get('http://127.0.0.1:9001/health', timeout=2).status_code == 200 else 1)"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 10

  # ──────────────────────────────────────────────────────────────
  # BLIP scene-caption adapter — VOICE + CHAT. Pulled from GHCR. Powers the
  # camera-agent's ``describe_camera`` tool with real natural-language scene
  # captions ("a person sitting at a desk"). Without it, describe_camera falls
  # back to the YOLOv8 object detector (class labels only). The
  # ``caption-adapter-register`` one-shot registers it with KAI-C once healthy.
  #
  # The published blip-adapter image ships with the ~990 MB BLIP weights baked
  # in (issue #79), so it captions offline under local_only — no first-run
  # HuggingFace download and no need to relax sovereignty. The hf-cache volume
  # below just persists the runtime cache across restarts.
  # ──────────────────────────────────────────────────────────────
  blip-adapter:
    profiles: [camera-agent, camera-agent-chat]
    image: ghcr.io/open-nvr/blip-adapter:${ADAPTER_TAG:-latest}
    container_name: opennvr_blip_adapter
    restart: unless-stopped
    environment:
      - OPENNVR_ADAPTER_TOKEN=${INTERNAL_API_KEY}
    volumes:
      - opennvr_blip_hf_cache:/root/.cache/huggingface
    networks:
      - opennvr_internal
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx, sys; sys.exit(0 if httpx.get('http://127.0.0.1:9006/health', timeout=2).status_code == 200 else 1)"]
      interval: 15s
      timeout: 5s
      start_period: 120s
      retries: 20

  # ──────────────────────────────────────────────────────────────
  # Caption-adapter auto-registration (test-report S-5) — VOICE + CHAT. On a
  # clean install the caption adapter was NOT registered with KAI-C, so
  # describe_camera silently fell back to the detector. This one-shot registers
  # BLIP so the agent actually uses real scene captions.
  # ──────────────────────────────────────────────────────────────
  caption-adapter-register:
    profiles: [camera-agent, camera-agent-chat]
    image: alpine:3.20
    container_name: opennvr_caption_register
    restart: "no"
    depends_on:
      opennvr-core:
        condition: service_healthy
    environment:
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    command:
      - sh
      - -c
      - |
        set -e
        name="blip"
        url="http://blip-adapter:9006"
        echo "Auto-registering caption adapter '$$name' -> $$url with KAI-C…"
        i=0
        while [ $$i -lt 30 ]; do
          if wget -q -O- \
               --header="Content-Type: application/json" \
               --header="X-Internal-Api-Key: $${INTERNAL_API_KEY}" \
               --post-data="{\"name\":\"$$name\",\"url\":\"$$url\"}" \
               http://opennvr-core:8100/api/v1/adapters/register >/dev/null 2>&1; then
            echo "Registered caption adapter '$$name'."; exit 0
          fi
          i=$$((i+1)); echo "register attempt $$i/30 failed (adapter warming up?); retry in 5s"; sleep 5
        done
        echo "WARN: could not register '$$name' after retries — describe_camera will fall back to the detector." >&2
        exit 0
    networks:
      - opennvr_internal

  # ──────────────────────────────────────────────────────────────
  # Ollama — local LLM runtime (VOICE + CHAT). Official upstream image: stable,
  # well-maintained, identical to what developers run on their laptops today.
  # ──────────────────────────────────────────────────────────────
  ollama:
    profiles: [camera-agent, camera-agent-chat]
    image: ollama/ollama:0.21.2
    container_name: opennvr_ollama
    restart: unless-stopped
    environment:
      # Keep the model resident in RAM indefinitely. Without this Ollama
      # unloads after 5 min idle, so the next turn pays a cold reload +
      # full prompt prefill and can blow past the request timeout. Warm,
      # turns return in seconds instead of ~a minute. On a VERY RAM-limited
      # box, set OLLAMA_KEEP_ALIVE=5m in .env to free the model's RAM when
      # idle (at the cost of a cold reload on the next turn).
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:--1}
      # Limited-hardware guards: load one model, serve one request at a time so
      # a weak CPU box isn't oversubscribed. Raise on bigger machines.
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - opennvr_ollama_models:/root/.ollama
    networks:
      - opennvr_internal
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Ollama model pull — one-shot (VOICE + CHAT). Runs AUTOMATICALLY on ``up``
  # because the agent depends_on it (service_completed_successfully), so the
  # model is present before the agent starts. Model = OLLAMA_MODEL in .env
  # (default qwen2.5:1.5b).
  # ──────────────────────────────────────────────────────────────
  ollama-model-pull:
    profiles: [camera-agent, camera-agent-chat]
    image: ollama/ollama:0.21.2
    container_name: opennvr_ollama_pull
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        set -e
        MODEL="$${OLLAMA_MODEL:-qwen2.5:1.5b}"
        echo "Pulling Ollama model: $$MODEL"
        OLLAMA_HOST=http://ollama:11434 ollama pull "$$MODEL"
        echo "Model ready."
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:1.5b}
    volumes:
      - opennvr_ollama_models:/root/.ollama
    networks:
      - opennvr_internal

  # ──────────────────────────────────────────────────────────────
  # VOICE — the hands-free agent. Built from local source for v0.1.
  # config.yml is generated from config.docker.yml by the init container so
  # secrets come from .env, not the repo.
  # ──────────────────────────────────────────────────────────────
  camera-agent-config-init:
    profiles: [camera-agent]
    image: alpine:3.20
    container_name: opennvr_camera_agent_config_init
    command:
      - sh
      - -c
      - |
        set -e
        # busybox sed substitutes only the named ${VARS}, leaving other ``$``
        # sigils in YAML multiline strings untouched (no envsubst / apk fetch,
        # which some operator ISPs filter).
        sed_esc() { printf '%s' "$$1" | sed -e 's/\\/\\\\/g; s/&/\\&/g; s/\//\\\//g'; }
        ikey=$$(sed_esc "$${INTERNAL_API_KEY}")
        lhost=$$(sed_esc "$${CAMERA_AGENT_LISTEN_HOST}")
        omodel=$$(sed_esc "$${OLLAMA_MODEL}")
        sed -e "s/[$$][{]INTERNAL_API_KEY[}]/$$ikey/g" \
            -e "s/[$$][{]CAMERA_AGENT_LISTEN_HOST[}]/$$lhost/g" \
            -e "s/[$$][{]OLLAMA_MODEL[}]/$$omodel/g" \
            -e "s/[$$][{]CAPTION_ADAPTER[}]/blip/g" \
            < /template/config.docker.yml > /generated/config.yml
        echo "Wrote /generated/config.yml (voice) from template."
    environment:
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - CAMERA_AGENT_LISTEN_HOST=0.0.0.0
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:1.5b}
    volumes:
      - ./examples/camera-agent:/template:ro
      - opennvr_camera_agent_config:/generated

  camera-agent:
    profiles: [camera-agent]
    build:
      context: .
      dockerfile: examples/camera-agent/Dockerfile
    image: opennvr/camera-agent:local-build
    container_name: opennvr_camera_agent
    restart: unless-stopped
    depends_on:
      camera-agent-config-init:
        condition: service_completed_successfully
      whisper-adapter:
        condition: service_healthy
      piper-adapter:
        condition: service_healthy
      blip-adapter:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-model-pull:
        condition: service_completed_successfully
      opennvr-core:
        condition: service_healthy
    ports:
      - "127.0.0.1:9100:9100"  # demo UI
    volumes:
      - opennvr_camera_agent_config:/app/config:ro
    command:
      - --config
      - /app/config/config.yml
    networks:
      - opennvr_internal

  # ──────────────────────────────────────────────────────────────
  # CHAT — the same agent in text mode (POST /ask): YOLOv8 + BLIP caption +
  # small LLM, NO Whisper/Piper. Lighter; type instead of speak. config.yml is
  # generated from config.docker.chat.yml by the init container below.
  # ──────────────────────────────────────────────────────────────
  camera-agent-config-init-chat:
    profiles: [camera-agent-chat]
    image: alpine:3.20
    container_name: opennvr_camera_agent_config_init_chat
    command:
      - sh
      - -c
      - |
        set -e
        sed_esc() { printf '%s' "$$1" | sed -e 's/\\/\\\\/g; s/&/\\&/g; s/\//\\\//g'; }
        ikey=$$(sed_esc "$${INTERNAL_API_KEY}")
        lhost=$$(sed_esc "$${CAMERA_AGENT_LISTEN_HOST}")
        omodel=$$(sed_esc "$${OLLAMA_MODEL}")
        sed -e "s/[$$][{]INTERNAL_API_KEY[}]/$$ikey/g" \
            -e "s/[$$][{]CAMERA_AGENT_LISTEN_HOST[}]/$$lhost/g" \
            -e "s/[$$][{]OLLAMA_MODEL[}]/$$omodel/g" \
            -e "s/[$$][{]CAPTION_ADAPTER[}]/blip/g" \
            < /template/config.docker.chat.yml > /generated/config.yml
        echo "Wrote /generated/config.yml (chat) from template."
    environment:
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - CAMERA_AGENT_LISTEN_HOST=0.0.0.0
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:1.5b}
    volumes:
      - ./examples/camera-agent:/template:ro
      - opennvr_camera_agent_config_chat:/generated

  camera-agent-chat:
    profiles: [camera-agent-chat]
    build:
      context: .
      dockerfile: examples/camera-agent/Dockerfile
    image: opennvr/camera-agent:local-build
    container_name: opennvr_camera_agent_chat
    restart: unless-stopped
    depends_on:
      camera-agent-config-init-chat:
        condition: service_completed_successfully
      # Chat uses BLIP scene captions, so wait for the adapter to be healthy and
      # registered before the first turn (else describe_camera falls back to the
      # detector until BLIP comes up).
      blip-adapter:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-model-pull:
        condition: service_completed_successfully
      opennvr-core:
        condition: service_healthy
    ports:
      - "127.0.0.1:9100:9100"  # demo UI (text chat)
    volumes:
      - opennvr_camera_agent_config_chat:/app/config:ro
    command:
      - --config
      - /app/config/config.yml
    networks:
      - opennvr_internal

volumes:
  # Ollama model store — persisted so the LLM survives ``compose down``.
  opennvr_ollama_models:
  # Faster-whisper model cache for the GHCR whisper adapter.
  opennvr_whisper_models:
  # HuggingFace cache for the BLIP scene-caption adapter (~990 MB).
  opennvr_blip_hf_cache:
  # Piper writes generated WAVs here before optionally returning inline
  # base64 audio to the camera-agent.
  opennvr_piper_audio:
  # Generated voice config.yml (mounted read-only by the camera-agent).
  opennvr_camera_agent_config:
  # Generated chat config.yml for the camera-agent-chat profile.
  opennvr_camera_agent_config_chat:
