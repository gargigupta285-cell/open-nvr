        sed -e "s/[$$][{]INTERNAL_API_KEY[}]/$$ikey/g" \
            < /template/config.docker.yml > /generated/config.yml
        echo "Wrote /generated/config.yml (smart-doorbell) from template."
    environment:
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    volumes:
      - ./examples/smart-doorbell:/template:ro
      - opennvr_smart_doorbell_config:/generated

  smart-doorbell:
