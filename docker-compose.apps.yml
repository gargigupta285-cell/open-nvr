    container_name: opennvr_smart_doorbell
    restart: unless-stopped
    depends_on:
      smart-doorbell-config-init:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      opennvr-core:
        # opennvr-core also hosts KAI-C on :8100 — the same
        # service_healthy gate covers the inference proxy too.
        condition: service_healthy
    environment:
      - OPENNVR_INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - NATS_URL=nats://nats:4222
      - OPENNVR_URL=http://opennvr-core:8000
    expose:
      - "9206"
    volumes:
      - opennvr_smart_doorbell_config:/app/config:ro
    # ``--config`` is a global option of this CLI and argparse requires
    # it BEFORE the ``daemon`` subcommand (``daemon --config …`` exits 2
    # with "the following arguments are required: --config") — verified
    # against the image's ENTRYPOINT ["python", "smart_doorbell.py"].
    command:
      - --config
      - /app/config/config.yml
      - daemon
    networks:
      - opennvr_internal

