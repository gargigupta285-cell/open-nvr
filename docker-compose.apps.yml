  # ──────────────────────────────────────────────────────────────
  # Smart doorbell — face recognition at the door via InsightFace
  # through KAI-C (FrameApp); known visitors low-severity, strangers
  # high with a snapshot. Contract surface on :9206.
  # NOTE: needs an InsightFace adapter registered with KAI-C under
  # name=insightface — the standard stack ships only yolov8.
  # ──────────────────────────────────────────────────────────────
  smart-doorbell-config-init:
    profiles: [apps]
    image: alpine:3.20
    container_name: opennvr_doorbell_config_init
    restart: "no"
    command:
