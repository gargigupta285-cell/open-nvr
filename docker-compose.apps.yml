  # ──────────────────────────────────────────────────────────────
  # Home Assistant relay — bridges the opennvr.alerts.* fan-out
  # into HA entities (MQTT discovery, or the HA REST API). Boots
  # cleanly without HA configured; set HA_MQTT_HOST (or switch the
  # template to backend: rest with HA_URL + HA_TOKEN) in .env to
  # start forwarding. Contract surface on :9209.
  # ──────────────────────────────────────────────────────────────
  home-assistant-relay-config-init:
    profiles: [apps]
    image: alpine:3.20
    container_name: opennvr_home_assistant_relay_config_init
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -e
        sed_esc() { printf '%s' "$$1" | sed -e 's/\\/\\\\/g; s/&/\\&/g; s/\//\\\//g'; }
        ikey=$$(sed_esc "$${INTERNAL_API_KEY}")
        mhost=$$(sed_esc "$${HA_MQTT_HOST}")
        haurl=$$(sed_esc "$${HA_URL}")
        hatok=$$(sed_esc "$${HA_TOKEN}")
        sed -e "s/[$$][{]INTERNAL_API_KEY[}]/$$ikey/g" \
            -e "s/[$$][{]HA_MQTT_HOST[}]/$$mhost/g" \
            -e "s/[$$][{]HA_URL[}]/$$haurl/g" \
            -e "s/[$$][{]HA_TOKEN[}]/$$hatok/g" \
            < /template/config.docker.yml > /generated/config.yml
        echo "Wrote /generated/config.yml (home-assistant-relay) from template."
    environment:
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      # Operator-set in .env — the relay's Home Assistant endpoint.
      # HA_MQTT_HOST for the default mqtt backend; HA_URL + HA_TOKEN
      # only if you switch the template to backend: rest. Unset ⇒ the
      # relay still boots and counts alerts, forwards fail with a
      # logged warning.
      - HA_MQTT_HOST=${HA_MQTT_HOST:-}
      - HA_URL=${HA_URL:-}
      - HA_TOKEN=${HA_TOKEN:-}
    volumes:
      - ./examples/home-assistant-relay:/template:ro
      - opennvr_home_assistant_relay_config:/generated

  home-assistant-relay:
    profiles: [apps]
    build:
      context: .
      dockerfile: examples/home-assistant-relay/Dockerfile
    # Digest pin slot — see docs/APPS_INSTALL.md → Digest pinning.
    image: ${HOME_ASSISTANT_RELAY_IMAGE:-opennvr/home-assistant-relay:local-build}
    container_name: opennvr_home_assistant_relay
    restart: unless-stopped
    depends_on:
      home-assistant-relay-config-init:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      opennvr-core:
        condition: service_healthy
    environment:
      - OPENNVR_INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - NATS_URL=nats://nats:4222
      - OPENNVR_URL=http://opennvr-core:8000
    expose:
      - "9209"
    volumes:
      - opennvr_home_assistant_relay_config:/app/config:ro
    command:
      - --config
      - /app/config/config.yml
    networks:
      - opennvr_internal

volumes:
  # Generated config.yml files (mounted read-only by each app).
  opennvr_loitering_config:
  opennvr_occupancy_config:
  opennvr_line_crossing_config:
  opennvr_abandoned_object_config:
  opennvr_intrusion_detection_config:
  opennvr_license_plate_recognition_config:
  opennvr_smart_doorbell_config:
  opennvr_package_delivery_config:
  opennvr_footage_search_config:
  # footage-search's persistent SQLite index (see its store.py).
  opennvr_footage_search_data:
  opennvr_home_assistant_relay_config:
